<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <title>同频地球 Mood Earth（纯离线）</title>
  <style>
    :root{
      --bg0:#120b10;
      --bg1:#1a0f1c;
      --warm0:#ffb36b;
      --warm1:#ff7b6b;
      --warm2:#ffd7a1;
      --card:#1c1420cc;
      --card2:#2a1a2fcc;
      --txt:#fff7ee;
      --muted:#cdbfb5;
      --btn:#ff8a6b;
      --btn2:#ffcf8a;
      --shadow: 0 14px 38px rgba(0,0,0,.35);
    }
    html,body{height:100%; margin:0; overflow:hidden; background:radial-gradient(110% 90% at 50% 10%, #2b1330 0%, var(--bg0) 50%, #07050a 100%); font-family: ui-sans-serif, system-ui, -apple-system, "PingFang SC","Microsoft YaHei", Segoe UI, Roboto, Arial; color:var(--txt);}
    #wrap{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; touch-action:none;}
    canvas{width:100%; height:100%; display:block;}
    #ui{position:fixed; inset:0; pointer-events:none; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
    .layer{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px;}
    .topbar{position:absolute; left:0; right:0; top:0; padding:16px 18px 10px; pointer-events:none; display:flex; align-items:flex-start; justify-content:center;}
    .hint{max-width:min(520px, 90vw); font-size:14px; line-height:1.55; color:var(--muted); text-align:center; text-shadow:0 2px 14px rgba(0,0,0,.35);}
    .title{font-size:26px; letter-spacing:.6px; text-align:center; margin:0; text-shadow:0 10px 26px rgba(0,0,0,.35);}
    .subtitle{font-size:14px; color:var(--muted); text-align:center; line-height:1.6; margin:0; max-width:min(560px, 92vw);}
    .btnrow{display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:center; pointer-events:auto;}
    button{
      border:0;
      border-radius:999px;
      padding:12px 18px;
      font-size:14px;
      color:#1a0d13;
      cursor:pointer;
      background: linear-gradient(180deg, var(--btn2), var(--btn));
      box-shadow: var(--shadow);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    button.secondary{
      color: var(--txt);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:none;
    }
    button:active{transform: translateY(1px) scale(.99);}
    .pill{display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:var(--muted); pointer-events:auto;}
    .pill b{color:var(--txt); font-weight:600;}

    .bottom{position:absolute; left:0; right:0; bottom:0; padding:14px 18px 18px; display:flex; justify-content:center; pointer-events:none;}
    .bottom .btnrow{pointer-events:auto;}

    /* 名片 */
    #personCard{
      position:fixed;
      min-width:220px;
      max-width:260px;
      padding:12px 12px 10px;
      border-radius:16px;
      background: linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      pointer-events:none;
      opacity:0;
      transform: translateY(6px);
      transition: opacity .14s ease, transform .14s ease;
      backdrop-filter: blur(10px);
    }
    #personCard.show{opacity:1; transform: translateY(0);}
    #personCard .name{font-weight:650; font-size:14px;}
    #personCard .meta{font-size:12px; color:var(--muted); margin-top:2px; line-height:1.45;}
    #personCard .quote{font-size:12px; margin-top:8px; line-height:1.55; color: #ffe9d2;}
    #personCard .tag{display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-size:12px; color:var(--muted);}
    #personCard .dot{width:8px; height:8px; border-radius:999px; background: radial-gradient(circle at 30% 30%, #fff, var(--warm0) 35%, #ff5a6b 80%);}

    /* Modal */
    #modalMask{position:fixed; inset:0; background: rgba(0,0,0,.55); opacity:0; pointer-events:none; transition: opacity .18s ease;}
    #modalMask.show{opacity:1; pointer-events:auto;}
    #modal{
      position:fixed;
      left:50%;
      top:50%;
      transform: translate(-50%,-50%) scale(.98);
      width:min(520px, calc(100vw - 36px));
      background: linear-gradient(180deg, rgba(30,18,38,.92), rgba(18,10,20,.92));
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:16px 16px 14px;
      box-shadow: var(--shadow);
      opacity:0;
      pointer-events:none;
      transition: opacity .18s ease, transform .18s ease;
      backdrop-filter: blur(10px);
    }
    #modal.show{opacity:1; pointer-events:auto; transform: translate(-50%,-50%) scale(1);}
    .modalTitle{font-size:16px; font-weight:650; margin:2px 0 10px;}
    .modalDesc{font-size:12px; color:var(--muted); line-height:1.6; margin:0 0 12px;}
    .field{display:flex; flex-direction:column; gap:8px; margin:12px 0;}
    label{font-size:12px; color:var(--muted);}
    select, textarea, input{
      font: inherit;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: var(--txt);
      padding:10px 12px;
      outline:none;
    }
    /* Windows 下 select 的下拉项可能继承白色字体导致看不清：为 option 单独指定黑字白底 */
    select option{
      color:#111;
      background:#fff;
    }
    textarea{min-height:92px; resize:none;}
    .modalActions{display:flex; gap:10px; justify-content:flex-end; margin-top:12px;}
    .small{font-size:12px; color:var(--muted); line-height:1.55;}

    /* 结果卡展示容器 */
    #cardWrap{display:none; pointer-events:auto; width:min(460px, 92vw); padding:12px; border-radius:18px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); box-shadow: var(--shadow); backdrop-filter: blur(10px);}
    #cardWrap.show{display:block;}
    #cardCanvas{width:100%; height:auto; display:block; border-radius:14px; background:rgba(0,0,0,.12);}
    .stickerStage{width:min(520px, 92vw); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; pointer-events:auto;}
    .stickerPreview{
      width:min(430px, 78vw);
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
      padding:14px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.045));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 20px 54px rgba(0,0,0,.34), inset 0 0 36px rgba(255,207,138,.07);
      backdrop-filter:blur(10px);
    }
    .stickerPreview img{max-width:100%; max-height:100%; width:100%; height:100%; object-fit:contain; display:block; image-rendering:auto;}
    .stickerMissing{font-size:13px; line-height:1.6; color:var(--muted); text-align:center; padding:18px;}
    .stickerFineprint{font-size:12px; line-height:1.5; color:rgba(255,233,210,.68); text-align:center; max-width:min(460px, 88vw);}

    /* 顶部百分比 */
    #matchBar{position:absolute; left:0; right:0; top:0; padding:16px 18px 10px; display:none; justify-content:center; pointer-events:none;}
    #matchBar.show{display:flex;}

    /* 错误提示 */
    #err{position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:24px; background:rgba(0,0,0,.75); color:#fff; z-index:9999;}
    #err.show{display:flex;}
    #err .box{max-width:520px; width:100%; border-radius:18px; padding:18px; background:rgba(18,12,22,.92); border:1px solid rgba(255,255,255,.18); box-shadow: var(--shadow);}
    #err h3{margin:0 0 10px; font-size:16px;}
    #err p{margin:0; color:var(--muted); line-height:1.7; font-size:13px;}
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
  </div>
  <div id="ui">
    <div class="topbar"><div id="topHint" class="hint"></div></div>
    <div id="matchBar"><div class="pill"><span>同频</span><b id="matchPct">--%</b><span>｜</span><span id="matchTitle">正在寻找…</span></div></div>
    <div id="layer" class="layer"></div>
    <div class="bottom"><div id="bottomBtns" class="btnrow"></div></div>
  </div>

  <div id="personCard" aria-hidden="true">
    <div class="name" id="pcName"></div>
    <div class="meta" id="pcMeta"></div>
    <div class="quote" id="pcQuote"></div>
    <div class="tag"><span class="dot"></span><span id="pcMood"></span></div>
  </div>

  <div id="modalMask"></div>
  <div id="modal">
    <div class="modalTitle" id="modalTitle"></div>
    <div class="modalDesc" id="modalDesc"></div>
    <div id="modalBody"></div>
    <div class="modalActions" id="modalActions"></div>
  </div>

  <div id="err">
    <div class="box">
      <h3>哎呀，出错了，请重启试试吧~</h3>
      <p id="errDetail"></p>
    </div>
  </div>

  <script>
  (() => {
    'use strict';
    const ERROR_TEXT = '哎呀，出错了，请重启试试吧~';

    try {
      // ---------- DOM ----------
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
      const uiLayer = document.getElementById('layer');
      const bottomBtns = document.getElementById('bottomBtns');
      const topHint = document.getElementById('topHint');
      const matchBar = document.getElementById('matchBar');
      const matchPctEl = document.getElementById('matchPct');
      const matchTitleEl = document.getElementById('matchTitle');
      const personCard = document.getElementById('personCard');
      const pcName = document.getElementById('pcName');
      const pcMeta = document.getElementById('pcMeta');
      const pcQuote = document.getElementById('pcQuote');
      const pcMood = document.getElementById('pcMood');
      const modalMask = document.getElementById('modalMask');
      const modal = document.getElementById('modal');
      const modalTitle = document.getElementById('modalTitle');
      const modalDesc = document.getElementById('modalDesc');
      const modalBody = document.getElementById('modalBody');
      const modalActions = document.getElementById('modalActions');
      const err = document.getElementById('err');
      const errDetail = document.getElementById('errDetail');

      // ---------- Utilities ----------
      const TAU = Math.PI * 2;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const smooth = t => t * t * (3 - 2 * t);
      const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
      const now = () => performance.now();

      function mulberry32(seed) {
        let t = seed >>> 0;
        return function() {
          t += 0x6D2B79F5;
          let x = Math.imul(t ^ (t >>> 15), 1 | t);
          x ^= x + Math.imul(x ^ (x >>> 7), 61 | x);
          return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
        };
      }

      function hashStr(s){
        let h = 2166136261 >>> 0;
        for(let i=0;i<s.length;i++){
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }

      function latLonToVec(latRad, lonRad){
        const cl = Math.cos(latRad);
        return { x: cl * Math.cos(lonRad), y: Math.sin(latRad), z: cl * Math.sin(lonRad) };
      }

      // ---------- Quaternion rotation (避免“死角/万向节锁”) ----------
      function quat(x=0,y=0,z=0,w=1){ return {x,y,z,w}; }
      function quatNormalize(q){
        const m = Math.hypot(q.x,q.y,q.z,q.w) || 1;
        return { x:q.x/m, y:q.y/m, z:q.z/m, w:q.w/m };
      }
      function quatMul(a,b){
        return {
          w: a.w*b.w - a.x*b.x - a.y*b.y - a.z*b.z,
          x: a.w*b.x + a.x*b.w + a.y*b.z - a.z*b.y,
          y: a.w*b.y - a.x*b.z + a.y*b.w + a.z*b.x,
          z: a.w*b.z + a.x*b.y - a.y*b.x + a.z*b.w
        };
      }
      function quatFromAxisAngle(axis, ang){
        const h = ang*0.5;
        const s = Math.sin(h);
        const a = normalize(axis);
        return quat(a.x*s, a.y*s, a.z*s, Math.cos(h));
      }
      function quatRotateVec(q, v){
        // v' = q * (v,0) * q^-1
        const qv = {x:v.x,y:v.y,z:v.z,w:0};
        const qi = {x:-q.x,y:-q.y,z:-q.z,w:q.w};
        const t = quatMul(quatMul(q, qv), qi);
        return {x:t.x,y:t.y,z:t.z};
      }
      function quatSlerp(a,b,t){
        // robust slerp
        let cos = a.x*b.x + a.y*b.y + a.z*b.z + a.w*b.w;
        let bb = b;
        if (cos < 0){ cos = -cos; bb = {x:-b.x,y:-b.y,z:-b.z,w:-b.w}; }
        if (cos > 0.9995){
          return quatNormalize({
            x: lerp(a.x, bb.x, t),
            y: lerp(a.y, bb.y, t),
            z: lerp(a.z, bb.z, t),
            w: lerp(a.w, bb.w, t)
          });
        }
        const ang = Math.acos(clamp(cos, -1, 1));
        const s = Math.sin(ang);
        const w1 = Math.sin((1-t)*ang)/s;
        const w2 = Math.sin(t*ang)/s;
        return {
          x: a.x*w1 + bb.x*w2,
          y: a.y*w1 + bb.y*w2,
          z: a.z*w1 + bb.z*w2,
          w: a.w*w1 + bb.w*w2
        };
      }

      function quatFromUnitVectors(a, b){
        // returns q so that q * a = b  (a,b should be normalized)
        const v = { x: a.y*b.z - a.z*b.y, y: a.z*b.x - a.x*b.z, z: a.x*b.y - a.y*b.x };
        let w = 1 + (a.x*b.x + a.y*b.y + a.z*b.z);
        if (w < 1e-6){
          // 180°: pick an orthogonal axis
          const axis = Math.abs(a.x) > 0.1 ? normalize({x:-a.y, y:a.x, z:0}) : normalize({x:0, y:-a.z, z:a.y});
          return quatFromAxisAngle(axis, Math.PI);
        }
        return quatNormalize({ x: v.x, y: v.y, z: v.z, w });
      }

      function project(v, cx, cy, r){
        // orthographic projection, with slight perspective feel by scaling with z
        const p = 0.78 + 0.22 * (v.z + 1) * 0.5; // z in [-1,1]
        return { x: cx + v.x * r * p, y: cy + v.y * r * p, z: v.z };
      }

      function dot(a,b){ return a.x*b.x + a.y*b.y + a.z*b.z; }
      function mag(a){ return Math.sqrt(dot(a,a)); }
      function normalize(a){ const m = mag(a) || 1; return {x:a.x/m,y:a.y/m,z:a.z/m}; }

      let W=0, H=0, DPR=1;
      function resize(){
        DPR = Math.min(2, window.devicePixelRatio || 1);
        W = Math.max(1, Math.floor(innerWidth * DPR));
        H = Math.max(1, Math.floor(innerHeight * DPR));
        canvas.width = W;
        canvas.height = H;
      }

      resize();

      const LAND_MASK_BYTES = (() => {
        try{
          const bin = atob(LAND_MASK_B64);
          const out = new Uint8Array(bin.length);
          for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
          return out;
        } catch(_){
          return null;
        }
      })();
      function wrapLon(lon){
        let x = lon;
        while (x >= 180) x -= 360;
        while (x < -180) x += 360;
        return x;
      }
      function isLandMask(latDeg, lonDeg){
        if (!LAND_MASK_BYTES) return false;
        lonDeg = wrapLon(lonDeg);
        const x = Math.floor(((lonDeg + 180) / 360) * (LAND_MASK_W - 1));
        const y = Math.floor(((90 - latDeg) / 180) * (LAND_MASK_H - 1));
        const idx = y * LAND_MASK_W + x;
        return ((LAND_MASK_BYTES[idx >> 3] >> (idx & 7)) & 1) === 1;
      }
      // 统一的“陆地判定”入口：优先使用内嵌 Land Mask（跨浏览器/打开方式稳定一致）
      function isLandStable(latDeg, lonDeg){
        if (LAND_MASK_BYTES) return isLandMask(latDeg, lonDeg);
        if (earthTex.ready) return isLandFromTexture(latDeg, lonDeg);
        return false;
      }
      const earthTexLoadPromise = (() => {
        const img = new Image();
        img.decoding = 'async';
        img.src = EARTH_TEX_URI;
        return new Promise((resolve) => {
          img.onload = () => {
            earthImgEl = img;
            earthImgReady = true;
            try{
              const oc = document.createElement('canvas');
              oc.width = img.naturalWidth || 512;
              oc.height = img.naturalHeight || 256;
              const og = oc.getContext('2d', { willReadFrequently:true });
              og.drawImage(img, 0, 0);
              const id = og.getImageData(0,0,oc.width,oc.height);
              earthTex.ready = true;
              earthTex.w = oc.width;
              earthTex.h = oc.height;
              earthTex.data = id.data;
              earthTexFailed = false;
            }catch(_){
              earthTex.ready = false;
              earthTexFailed = true;
            }
            resolve(true);
          };
          img.onerror = () => { earthTex.ready = false; earthTexFailed = true; earthImgReady = false; earthImgEl = null; resolve(false); };
        });

      function sampleEarthTex(latDeg, lonDeg){
        // equirectangular: x=lon, y=lat
        if (!earthTex.ready) return {r:0,g:0,b:0,a:0};
        const w = earthTex.w, h = earthTex.h, d = earthTex.data;
        const x = Math.floor(((lonDeg + 180) / 360) * (w - 1));
        const y = Math.floor(((90 - latDeg) / 180) * (h - 1));
        const idx = (y*w + x) * 4;
        return { r:d[idx], g:d[idx+1], b:d[idx+2], a:d[idx+3] };
      }
      function isLandFromTexture(latDeg, lonDeg){
        const c = sampleEarthTex(latDeg, lonDeg);
        // 经验规则：海洋蓝通道通常更高；陆地（绿/棕/白）蓝通道不占绝对优势
        // 同时排除极地海冰（接近白色）仍算“陆地/可落点”
        const blueDominant = (c.b > c.g + 22) && (c.b > c.r + 18);
        const isWhite = (c.r + c.g + c.b) > 700; // 冰雪
        return (!blueDominant) || isWhite;
      }

      function lerpColor(a, b, t){
        return {
          r: Math.round(lerp(a.r, b.r, t)),
          g: Math.round(lerp(a.g, b.g, t)),
          b: Math.round(lerp(a.b, b.b, t)),
        };
      }

      // ---------- Texture-mapped sphere fallback (NO getImageData needed) ----------
      // 解决：某些浏览器在 file:// 场景下不允许 canvas 读取本地图片像素（getImageData 失败），导致“大洲消失”。
      // 这里提供纯 drawImage 的纹理映射方案：即使无法读像素，也能显示真实大洲轮廓。
      function drawImageTriangle(ctx, img, s0, s1, s2, d0, d1, d2){
        // Affine map source triangle -> destination triangle
        const denom = (s0.x*(s1.y - s2.y) + s1.x*(s2.y - s0.y) + s2.x*(s0.y - s1.y));
        if (Math.abs(denom) < 1e-6) return;
        const a = (d0.x*(s1.y - s2.y) + d1.x*(s2.y - s0.y) + d2.x*(s0.y - s1.y)) / denom;
        const b = (d0.y*(s1.y - s2.y) + d1.y*(s2.y - s0.y) + d2.y*(s0.y - s1.y)) / denom;
        const c = (d0.x*(s2.x - s1.x) + d1.x*(s0.x - s2.x) + d2.x*(s1.x - s0.x)) / denom;
        const d = (d0.y*(s2.x - s1.x) + d1.y*(s0.x - s2.x) + d2.y*(s1.x - s0.x)) / denom;
        const e = (d0.x*(s1.x*s2.y - s2.x*s1.y) + d1.x*(s2.x*s0.y - s0.x*s2.y) + d2.x*(s0.x*s1.y - s1.x*s0.y)) / denom;
        const f = (d0.y*(s1.x*s2.y - s2.x*s1.y) + d1.y*(s2.x*s0.y - s0.x*s2.y) + d2.y*(s0.x*s1.y - s1.x*s0.y)) / denom;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(d0.x, d0.y);
        ctx.lineTo(d1.x, d1.y);
        ctx.lineTo(d2.x, d2.y);
        ctx.closePath();
        ctx.clip();
        ctx.setTransform(a, b, c, d, e, f);
        ctx.drawImage(img, 0, 0);
        ctx.restore();
      }

      function drawTexturedSphere(ctx, cx, cy, r, q, img){
        const iw = img.naturalWidth || img.width;
        const ih = img.naturalHeight || img.height;
        if (!iw || !ih) return;

        const latBands = 18;  // performance-friendly
        const lonBands = 36;

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, TAU);
        ctx.clip();

        // base ocean tint
        const oceanGrad = ctx.createRadialGradient(cx - r*0.3, cy - r*0.35, r*0.1, cx, cy, r*1.2);
        oceanGrad.addColorStop(0, 'rgba(40, 18, 55, .90)');
        oceanGrad.addColorStop(1, 'rgba(12, 6, 20, .98)');
        ctx.fillStyle = oceanGrad;
        ctx.fillRect(cx-r, cy-r, r*2, r*2);

        // draw quads as 2 triangles
        for(let il=0; il<latBands; il++){
          const lat0 = lerp(-90, 90, il/latBands);
          const lat1 = lerp(-90, 90, (il+1)/latBands);
          const v0 = (90 - lat0)/180; // texture v
          const v1 = (90 - lat1)/180;
          for(let io=0; io<lonBands; io++){
            const lon0 = lerp(-180, 180, io/lonBands);
            const lon1 = lerp(-180, 180, (io+1)/lonBands);
            const u0 = (lon0 + 180)/360;
            const u1 = (lon1 + 180)/360;

            // cell center visibility check
            const cLat = (lat0+lat1)*0.5, cLon = (lon0+lon1)*0.5;
            const cv = quatRotateVec(q, latLonToVec(cLat*Math.PI/180, cLon*Math.PI/180));
            if (cv.z <= 0) continue;

            const p00v = quatRotateVec(q, latLonToVec(lat0*Math.PI/180, lon0*Math.PI/180));
            const p10v = quatRotateVec(q, latLonToVec(lat0*Math.PI/180, lon1*Math.PI/180));
            const p01v = quatRotateVec(q, latLonToVec(lat1*Math.PI/180, lon0*Math.PI/180));
            const p11v = quatRotateVec(q, latLonToVec(lat1*Math.PI/180, lon1*Math.PI/180));
            if (p00v.z <= 0 && p10v.z <= 0 && p01v.z <= 0 && p11v.z <= 0) continue;

            const p00 = project(p00v, cx, cy, r);
            const p10 = project(p10v, cx, cy, r);
            const p01 = project(p01v, cx, cy, r);
            const p11 = project(p11v, cx, cy, r);

            const s00 = { x: u0*iw, y: v0*ih };
            const s10 = { x: u1*iw, y: v0*ih };
            const s01 = { x: u0*iw, y: v1*ih };
            const s11 = { x: u1*iw, y: v1*ih };

            // tri1: 00-10-11
            drawImageTriangle(ctx, img, s00, s10, s11, {x:p00.x,y:p00.y}, {x:p10.x,y:p10.y}, {x:p11.x,y:p11.y});
            // tri2: 00-11-01
            drawImageTriangle(ctx, img, s00, s11, s01, {x:p00.x,y:p00.y}, {x:p11.x,y:p11.y}, {x:p01.x,y:p01.y});
          }
        }

        // lighting/shading overlay
        const shade = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, r*0.2, cx, cy, r*1.15);
        shade.addColorStop(0, 'rgba(255,255,255,.06)');
        shade.addColorStop(0.55, 'rgba(0,0,0,.10)');
        shade.addColorStop(1, 'rgba(0,0,0,.55)');
        ctx.globalCompositeOperation = 'multiply';
        ctx.fillStyle = shade;
        ctx.fillRect(cx-r, cy-r, r*2, r*2);
        ctx.globalCompositeOperation = 'source-over';

        // gloss
        const gloss = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, 0, cx - r*0.2, cy - r*0.2, r*1.2);
        gloss.addColorStop(0, 'rgba(255,255,255,.20)');
        gloss.addColorStop(0.6, 'rgba(255,255,255,.05)');
        gloss.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gloss;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, TAU);
        ctx.fill();

        ctx.restore();
      }

      // Pixel-art style sphere (works even when we can't read pixels)
      const pixelSphereCache = { canvas: null, ctx: null, size: 0 };
      function drawPixelatedSphere(ctx, cx, cy, r, q, img){
        // Render a small textured sphere to offscreen, then scale up with smoothing off.
        const size = clamp(Math.round(r * 1.15), 140, 320); // control "pixel" size
        if (!pixelSphereCache.canvas || pixelSphereCache.size !== size){
          const c = document.createElement('canvas');
          c.width = size;
          c.height = size;
          pixelSphereCache.canvas = c;
          pixelSphereCache.ctx = c.getContext('2d');
          pixelSphereCache.size = size;
        }
        const oc = pixelSphereCache.ctx;
        oc.setTransform(1,0,0,1,0,0);
        oc.clearRect(0,0,size,size);
        // draw small sphere
        drawTexturedSphere(oc, size*0.5, size*0.5, size*0.5 - 2, q, img);
        // scale up without smoothing → pixel look
        ctx.save();
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(pixelSphereCache.canvas, cx - r, cy - r, r*2, r*2);
        ctx.restore();
      }

      function genPeople(count = 140){

            lon = (localRng()*360 - 180);
            // 优先使用内嵌 Land Mask（稳定）；否则再退回纹理采样；最后才放宽随机落点
            if ((LAND_MASK_BYTES && isLandMask(lat, lon)) || (!LAND_MASK_BYTES && earthTex.ready && isLandFromTexture(lat, lon)) || (localRng() < 0.35)) break;
          }
          const m = moods[Math.floor(localRng()*moods.length)];
          const nm = namePool[Math.floor(localRng()*namePool.length)];
          const q = quotes[Math.floor(localRng()*quotes.length)];
          const region = regionByLatLon(lat, lon);
          const tz = Math.floor((lon+180)/15) - 12;
          const hour = (Math.floor((Date.now()/3600000) + tz) % 24 + 24) % 24;
          const minute = Math.floor(localRng()*60);
          const timeStr = String(hour).padStart(2,'0') + ':' + String(minute).padStart(2,'0');
          // slightly jitter vec
          const vec = m.vec.map(v => clamp(v + (localRng()*0.22 - 0.11), 0, 1));
          people.push({
            id: i,
            name: nm,
            lat, lon,
            region,
            mood: m.key,
            vec,
            quote: q,
            tw: localRng()*TAU,
            timeStr
          });
        }
      }

      // 旧的“简化多边形大陆”已弃用，改为使用真实地球纹理采样（见 isLandFromTexture）。

      // ---------- Globe Interaction ----------
      // 用四元数存姿态，避免旋转“死角”
      let globeQ = quatNormalize(quatMul(
        quatFromAxisAngle({x:0,y:1,z:0}, -0.7),
        quatFromAxisAngle({x:1,y:0,z:0}, 0.14)
      ));
      let yawVel = 0, pitchVel = 0;
      let dragging = false;
      let dragId = null;
      let dragMoved = false;
      let downPX = 0, downPY = 0;
      let lastPX = 0, lastPY = 0;

      let globeScale = 1.0;
      let targetScale = globeScale;
      let focusAnim = null; // {t0,dur, from:{rx,ry,s}, to:{rx,ry,s}, onDone}

      function quatForLatLonFront(latDeg, lonDeg){
        // 让指定经纬点真正落到镜头正前方（避免“没停到同频星星那里”）
        const a = normalize(latLonToVec(latDeg*Math.PI/180, lonDeg*Math.PI/180)); // earth-fixed vector
        const forward = { x: 0, y: 0, z: 1 };
        return quatFromUnitVectors(a, forward);
      }
      function setFocus(latDeg, lonDeg, scale = 1.22, dur=1200, onDone=null){
        const qTo = quatForLatLonFront(latDeg, lonDeg);
        // 自动聚焦时，停止惯性旋转，避免“转不停/停不准”
        yawVel = 0;
        pitchVel = 0;
        focusAnim = {
          t0: now(),
          dur,
          from: { q: globeQ, s: globeScale },
          to: { q: qTo, s: scale },
          onDone
        };
      }

      function pointerPos(e){
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * DPR;
        const y = (e.clientY - rect.top) * DPR;
        return {x,y};
      }

      canvas.addEventListener('pointerdown', (e) => {
        if (scene !== Scene.GLOBE && scene !== Scene.MATCH) return;
        dragging = true;
        dragId = e.pointerId;
        dragMoved = false;
        // 用户开始拖动时，不要“锁定/回弹”到任何预设角度
        focusAnim = null;
        canvas.setPointerCapture(dragId);
        const p = pointerPos(e);
        downPX = p.x; downPY = p.y;
        lastPX = p.x; lastPY = p.y;
        yawVel = pitchVel = 0;
      }, { passive: true });

      canvas.addEventListener('pointermove', (e) => {
        const p = pointerPos(e);
        if (dragging && e.pointerId === dragId){
          const dx = p.x - lastPX;
          const dy = p.y - lastPY;
          lastPX = p.x; lastPY = p.y;
          if (!dragMoved){
            const md = Math.abs(p.x - downPX) + Math.abs(p.y - downPY);
            if (md > 10 * DPR) dragMoved = true;
          }
          const s = 0.0052;
          const yaw = dx * s;
          // 让“拖动方向”和“地球转动方向”上下保持同向（之前上下反了）
          const pitch = -dy * s;
          // yaw: world Y; pitch: world X
          globeQ = quatNormalize(quatMul(
            quatMul(quatFromAxisAngle({x:0,y:1,z:0}, yaw), quatFromAxisAngle({x:1,y:0,z:0}, pitch)),
            globeQ
          ));
          yawVel = yaw * 0.55;
          pitchVel = pitch * 0.55;
          hidePersonCard();
        } else {
          // hover (desktop): find star
          if (scene === Scene.GLOBE || scene === Scene.MATCH){
            if (supportsHover){
              const hit = pickStar(p.x, p.y);
              if (hit) showPersonCard(hit, p.x, p.y);
              else hidePersonCard();
            }
          }
        }
      }, { passive: true });

      canvas.addEventListener('pointerup', (e) => {
        if (dragging && e.pointerId === dragId){
          const p = pointerPos(e);
          const shouldTap = !dragMoved;
          dragging = false;
          dragId = null;
          if (shouldTap && (scene === Scene.GLOBE || scene === Scene.MATCH)){
            const hit = pickStar(p.x, p.y);
            if (hit) showPersonCard(hit, p.x, p.y, true);
            else hidePersonCard(true);
          }
        } else {
          // tap/click star (mobile)
          if (scene === Scene.GLOBE || scene === Scene.MATCH){
            const p = pointerPos(e);
            const hit = pickStar(p.x, p.y);
            if (hit) {
              showPersonCard(hit, p.x, p.y, true);
            } else {
              hidePersonCard(true);
            }
          }
        }
      }, { passive: true });

      canvas.addEventListener('pointercancel', () => {
        dragging = false; dragId = null;
      }, { passive: true });

      const supportsHover = matchMedia('(hover:hover)').matches;

      // ---------- UI helpers ----------
      function clearUI(){
        uiLayer.innerHTML = '';
        bottomBtns.innerHTML = '';
        topHint.textContent = '';
        matchBar.classList.remove('show');
      }

      function setLayer(html){
        uiLayer.innerHTML = html;
      }
      function setBottomButtons(btns){
        bottomBtns.innerHTML = '';
        for(const b of btns){
          const el = document.createElement('button');
          el.textContent = b.text;
          if (b.secondary) el.classList.add('secondary');
          el.addEventListener('click', b.onClick);
          bottomBtns.appendChild(el);
        }
      }

      function showPersonCard(p, sx, sy, pin=false){
        pcName.textContent = p.name;
        pcMeta.textContent = `${p.region}｜此刻 ${p.timeStr}`;
        pcQuote.textContent = `“${p.quote}”`;
        pcMood.textContent = `心理状态：${p.mood}`;

        const pad = 14 * DPR;
        const rect = personCard.getBoundingClientRect();
        const w = rect.width * DPR || 240*DPR;
        const h = rect.height * DPR || 140*DPR;
        let x = sx + pad;
        let y = sy + pad;
        if (x + w > W) x = sx - w - pad;
        if (y + h > H) y = sy - h - pad;
        x = clamp(x, 10*DPR, W - w - 10*DPR);
        y = clamp(y, 10*DPR, H - h - 10*DPR);

        personCard.style.left = (x / DPR) + 'px';
        personCard.style.top  = (y / DPR) + 'px';
        personCard.classList.add('show');
        personCard.dataset.pin = pin ? '1' : '0';
      }
      function hidePersonCard(force=false){
        if (!force && personCard.dataset.pin === '1') return;
        personCard.classList.remove('show');
        personCard.dataset.pin = '0';
      }

      function showModal({title, desc, bodyNodes, actions}){
        modalTitle.textContent = title || '';
        modalDesc.textContent = desc || '';
        modalBody.innerHTML = '';
        for(const n of (bodyNodes || [])) modalBody.appendChild(n);
        modalActions.innerHTML = '';
        for(const a of (actions || [])){
          const b = document.createElement('button');
          b.textContent = a.text;
          if (a.secondary) b.classList.add('secondary');
          b.addEventListener('click', a.onClick);
          modalActions.appendChild(b);
        }
        modalMask.classList.add('show');
        modal.classList.add('show');
      }
      function closeModal(){
        modalMask.classList.remove('show');
        modal.classList.remove('show');
      }
      modalMask.addEventListener('click', closeModal);

      // ---------- Scene: Intro ----------
      function enterIntro(){
        scene = Scene.INTRO;
        clearUI();
        setLayer(`
          <h1 class="title">同频地球 · Mood Earth</h1>
          <p class="subtitle">当你把此刻的心情轻轻发往地球，世界另一端会有一颗小星星回应你。<br/>这是一份纯离线的互动体验：旋转地球、点亮星光、记录情绪、寻找同频。</p>
          <div class="btnrow">
            <button id="go">进入同频地球</button>
            <button class="secondary" id="how">怎么玩</button>
          </div>
          <div class="hint">提示：手机竖屏体验最佳；在地球上拖动/滑动可以旋转，点小星星会出现名片。</div>
        `);
        document.getElementById('go').onclick = () => enterGlobe();
        document.getElementById('how').onclick = () => {
          showModal({
            title:'怎么玩（纯离线）',
            desc:'你将经历 7 个界面：进入 → 旋转地球 → 选择地区 → 情绪气泡 → 生成专属卡 → 同频匹配 → 疗愈海报 + 30s 歌曲 → 专属贴纸。',
            bodyNodes:[
              Object.assign(document.createElement('div'), { className:'small', innerHTML:
                `1）地球上闪烁的小星星代表“此刻也有类似心理需求的人”。<br/>
                 2）第 3 页不是问卷：点气泡，气泡会变大；<b>2.6 秒无操作</b>会自动记录并进入下一题。<br/>
                 3）所有人物均为离线随机生成的虚拟角色，不联网。`
              })
            ],
            actions:[{text:'知道了', onClick: closeModal}]
          });
        };
      }

      // ---------- Scene: Globe ----------
      const presetPlaces = [
        { label:'中国·重庆', lat:29.56, lon:106.55 },
        { label:'中国·北京', lat:39.90, lon:116.40 },
        { label:'日本·东京', lat:35.68, lon:139.65 },
        { label:'韩国·首尔', lat:37.57, lon:126.98 },
        { label:'英国·伦敦', lat:51.50, lon:-0.12 },
        { label:'法国·巴黎', lat:48.86, lon:2.35 },
        { label:'美国·纽约', lat:40.71, lon:-74.00 },
        { label:'巴西·里约', lat:-22.91, lon:-43.17 },
        { label:'埃及·开罗', lat:30.04, lon:31.24 },
        { label:'肯尼亚·内罗毕', lat:-1.29, lon:36.82 },
        { label:'冰岛·雷克雅未克', lat:64.13, lon:-21.90 },
        { label:'随机地点', lat:0, lon:0, random:true },
      ];

      function enterGlobe(){
        scene = Scene.GLOBE;
        clearUI();
        hidePersonCard(true);
        // 确保真实纹理加载完成后再生成“星星人物”（让落点更接近真实陆地）
        earthTexLoadPromise.then(() => {
          if (!people.length) genPeople();
        });

        topHint.textContent = '拖动/滑动旋转地球 · 轻触/悬停小星星查看名片';
        // 给出友好提示：建议用本目录的 start-local.bat 启动本地服务器再打开（完全离线，且兼容性更稳定）
        setTimeout(() => {
          if ((scene === Scene.GLOBE || scene === Scene.MATCH) && earthTexFailed){
            topHint.textContent = '提示：建议运行本目录的 start-local.bat 打开（完全离线），体验更稳定。';
          }
        }, 900);
        setBottomButtons([
          { text:'进入我的 mood', onClick: openPlacePicker },
          { text:'返回', secondary:true, onClick: enterIntro }
        ]);
      }

      function openPlacePicker(){
        const field = document.createElement('div');
        field.className = 'field';
        const lab = document.createElement('label'); lab.textContent = '选择国家/地区（离线预设）';
        const sel = document.createElement('select');
        for(const p of presetPlaces){
          const o = document.createElement('option');
          o.value = p.label;
          o.textContent = p.label;
          sel.appendChild(o);
        }
        field.appendChild(lab);
        field.appendChild(sel);

        const tip = document.createElement('div');
        tip.className = 'small';
        tip.innerHTML = '选择后，地球会旋转并放大到你的位置，然后进入情绪气泡。';

        showModal({
          title:'进入我的 mood',
          desc:'先让地球知道你在哪里，星光会更贴近你。',
          bodyNodes:[field, tip],
          actions:[
            { text:'确定', onClick: () => {
              const label = sel.value;
              let place = presetPlaces.find(x => x.label === label) || presetPlaces[0];
              if (place.random){
                const lat = rng()*140 - 70;
                const lon = rng()*360 - 180;
                place = { label:'随机地点', lat, lon };
              }
              user.place = { label: place.label, lat: place.lat, lon: place.lon };
              closeModal();
              setFocus(user.place.lat, user.place.lon, 1.26, 1500, () => enterQuestions());
            }},
            { text:'取消', secondary:true, onClick: closeModal }
          ]
        });
      }

      // ---------- Scene: Questions (Bubble) ----------
      const QUESTIONS = [
        {
          q:'此刻最贴近你的感受是？',
          opts:['迷茫','孤独','焦虑','平静','兴奋','想被理解']
        },
        {
          q:'你最需要什么？',
          opts:['陪伴','安静','鼓励','方向','释放','被看见']
        },
        {
          q:'你的能量状态更像哪一种？',
          opts:['低电量','有点累','刚刚好','满格','过载']
        }
      ];
      const IDLE_TO_NEXT_MS = 2600;
      let qIndex = 0;
      let bubbles = [];
      let idleAt = 0;
      let lastInteractAt = 0;
      let qTransitioning = false;
      let qNextTimer = null;
      let feedbackToast = null; // { text, t0, dur }
      let lastFeedbackText = '';

      // ---------- Question Themes (每题一个氛围场：背景渐变 + 气泡色相基调) ----------
      const QUESTION_THEMES = [
        // Q1: 更暖一点（靠近主题橙粉）
        { bg0:'#32142d', bg1:'#140913', bg2:'#07050a', hueBase: 22,  accent:'#ffcf8a' },
        // Q2: 更柔一点（粉紫/温柔）
        { bg0:'#2c1232', bg1:'#120816', bg2:'#07050a', hueBase: 330, accent:'#ffb6c2' },
        // Q3: 更明亮一点（琥珀/能量）
        { bg0:'#2b1231', bg1:'#1a0b12', bg2:'#07050a', hueBase: 38,  accent:'#ffd07a' },
      ];
      let qTheme = QUESTION_THEMES[0];

      // ---------- Gentle particles for bubble clicks ----------
      const clickParticles = [];
      const MAX_PARTICLES = 260;
      let dtSec = 1/60;

      // ---------- Ripple rings (点击涟漪反馈) ----------
      const ripples = []; // {x,y,t,ttl,r0,hue,str}
      function emitRipple(x, y, hue, strength){
        ripples.push({
          x, y,
          t: 0,
          ttl: 0.65 + strength*0.25,
          r0: (18 + strength*10) * DPR,
          hue,
          str: strength
        });
        if (ripples.length > 18) ripples.shift();
      }
      function updateRipples(){
        for(let i=ripples.length-1;i>=0;i--){
          const p = ripples[i];
          p.t += dtSec;
          if (p.t >= p.ttl) ripples.splice(i,1);
        }
      }
      function drawRipples(g){
        if (!ripples.length) return;
        g.save();
        g.globalCompositeOperation = 'lighter';
        for(const p of ripples){
          const u = p.t / p.ttl; // 0..1
          const a = (1 - u);
          const r1 = p.r0 + u*u * (140*DPR);
          const r2 = r1 * 0.68;
          const r3 = r1 * 0.42;
          g.lineWidth = (2.5 + p.str*1.2) * DPR;
          g.strokeStyle = `hsla(${p.hue}, 95%, 78%, ${0.20*a})`;
          g.beginPath(); g.arc(p.x, p.y, r1, 0, TAU); g.stroke();
          g.strokeStyle = `hsla(${p.hue+10}, 95%, 82%, ${0.26*a})`;
          g.beginPath(); g.arc(p.x, p.y, r2, 0, TAU); g.stroke();
          g.strokeStyle = `hsla(${p.hue+18}, 95%, 88%, ${0.32*a})`;
          g.beginPath(); g.arc(p.x, p.y, r3, 0, TAU); g.stroke();
        }
        g.restore();
      }

      function emitBubbleParticles(x, y, hue, strength){
        const n = Math.round(16 + strength*10);
        for(let i=0;i<n;i++){
          if (clickParticles.length >= MAX_PARTICLES) clickParticles.shift();
          const a = rng()*TAU;
          const sp = (20 + rng()*90) * DPR * (0.65 + strength*0.55);
          const vx = Math.cos(a) * sp;
          const vy = Math.sin(a) * sp - (20*DPR);
          const ttl = (0.55 + rng()*0.55) * (0.85 + strength*0.35);
          clickParticles.push({
            x, y,
            vx, vy,
            t: 0,
            ttl,
            r: (1.6 + rng()*3.8) * DPR,
            hue: hue + (rng()*18 - 9),
            tw: rng()*TAU
          });
        }
      }

      function updateParticles(){
        for(let i=clickParticles.length-1;i>=0;i--){
          const p = clickParticles[i];
          p.t += dtSec;
          if (p.t >= p.ttl){
            clickParticles.splice(i,1);
            continue;
          }
          // gentle drift + damping
          p.vx *= 0.92;
          p.vy *= 0.92;
          p.vy += 18 * DPR * dtSec; // soft gravity
          p.x += p.vx * dtSec;
          p.y += p.vy * dtSec;
        }
      }

      function drawParticles(g){
        if (!clickParticles.length) return;
        g.save();
        g.globalCompositeOperation = 'lighter';
        for(const p of clickParticles){
          const u = p.t / p.ttl;
          const a = (1 - u);
          const tw = 0.65 + 0.35*Math.sin(p.tw + p.t*9.0);
          const rr = p.r * (0.9 + 0.6*u);
          const grad = g.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr*5.2);
          grad.addColorStop(0, `hsla(${p.hue}, 95%, 80%, ${0.22*a*tw})`);
          grad.addColorStop(0.35, `hsla(${p.hue+8}, 90%, 65%, ${0.12*a*tw})`);
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          g.fillStyle = grad;
          g.beginPath();
          g.arc(p.x, p.y, rr*5.2, 0, TAU);
          g.fill();
          g.fillStyle = `hsla(${p.hue}, 95%, 92%, ${0.55*a*tw})`;
          g.beginPath();
          g.arc(p.x, p.y, rr, 0, TAU);
          g.fill();
        }
        g.restore();
      }

      function enterQuestions(){
        scene = Scene.QUESTIONS;
        clearUI();
        hidePersonCard(true);
        topHint.textContent = '点击气泡，它会变大；2.6 秒无操作将自动记录并进入下一题';
        setBottomButtons([{ text:'返回地球', secondary:true, onClick: enterGlobe }]);

        qIndex = 0;
        user.moodVec = new Array(24).fill(0); // dynamic sparse vector (enough room)
        user.moodSummary = '';
        qTransitioning = false;
        if (qNextTimer) { try{ clearTimeout(qNextTimer); }catch(_){ } }
        qNextTimer = null;
        feedbackToast = null;
        nextQuestion();
      }

      function nextQuestion(){
        if (qIndex >= QUESTIONS.length){
          finalizeMoodSummary();
          enterUserCard();
          return;
        }
        const q = QUESTIONS[qIndex];
        qTheme = QUESTION_THEMES[qIndex % QUESTION_THEMES.length] || QUESTION_THEMES[0];
        feedbackToast = null;
        setLayer(`
          <h1 class="title" style="font-size:22px;">第 ${qIndex+1} / ${QUESTIONS.length} 题</h1>
          <p class="subtitle">${q.q}</p>
        `);

        // create bubbles
        const localRng = mulberry32(appSeed ^ hashStr(q.q));
        const n = q.opts.length;
        bubbles = [];
        const cx = W*0.5, cy = H*0.54;
        const R = Math.min(W,H) * 0.24;
        for(let i=0;i<n;i++){
          const a = (i/n)*TAU + localRng()*0.35;
          const rr = R*(0.75 + localRng()*0.3);
          bubbles.push({
            key: q.opts[i],
            x: cx + Math.cos(a)*rr,
            y: cy + Math.sin(a)*rr*0.72,
            base: (Math.min(W,H) * (0.052 + localRng()*0.015)),
            r: 0,
            clicks: 0,
            hue: (qTheme.hueBase + (localRng()*28 - 14) + 360) % 360,
            pulse: 0,
          });
        }
        for(const b of bubbles) b.r = b.base;
        idleAt = now() + IDLE_TO_NEXT_MS;
        lastInteractAt = now();
      }

      function recordQuestion(){
        // For each question, write its bubbles into vector slots (by stable ordering).
        const q = QUESTIONS[qIndex];
        const baseIdx = qIndex*8;
        for(let i=0;i<q.opts.length;i++){
          const b = bubbles[i];
          const intensity = clamp(b.clicks / 6, 0, 1) * 0.75 + clamp((b.r - b.base) / (b.base*2.2), 0, 1) * 0.25;
          user.moodVec[baseIdx + i] = clamp(intensity, 0, 1);
        }
      }

      function pickStrongestBubble(){
        if (!bubbles || !bubbles.length) return null;
        let best = null, bestVal = -1;
        for(const b of bubbles){
          const intensity = clamp(b.clicks / 6, 0, 1) * 0.75 + clamp((b.r - b.base) / (b.base*2.2), 0, 1) * 0.25;
          if (intensity > bestVal){
            bestVal = intensity;
            best = b;
          }
        }
        if (!best || bestVal < 0.06) return null;
        return { key: best.key, val: bestVal, hue: best.hue };
      }

      // 反馈语池：每题多准备一些，随机抽一条（离线伪随机）
      const FEEDBACK_POOL = {
        0: [
          '我听见了：{x}。',
          '你正在表达：{x}。',
          '好的，我记住了这份{ x }。',
          '先把{ x }放在心上，我们继续。',
          '原来此刻更贴近你的是：{x}。',
          '收到：{x}。谢谢你说出来。'
        ],
        1: [
          '收到：你需要{x}。',
          '好，我们把{x}留给现在的你。',
          '我明白了：你想要{x}。',
          '这很重要：{x}。',
          '让{x}先靠近你一点。',
          '好的，给你一份{x}。'
        ],
        2: [
          '记下了：你此刻更像「{x}」。',
          '我看见了：你的能量是「{x}」。',
          '好的，就按「{x}」来照顾你。',
          '明白：现在是「{x}」。',
          '我们一起承认：此刻「{x}」。',
          '好的，保持「{x}」也很好。'
        ],
        none: [
          '没关系，慢慢来。',
          '你已经做得很好了。',
          '不用着急，下一题见。',
          '我在这儿，我们继续。',
          '呼吸一下就好。',
          '允许自己说不清。'
        ]
      };
      function formatFeedback(s, x){
        return String(s).replace(/\{x\}/g, x).replace(/\{\s*x\s*\}/g, x);
      }
      function pickFrom(arr, rng){
        if (!arr || !arr.length) return '';
        // avoid immediate repeat if possible
        for(let tries=0; tries<6; tries++){
          const t = arr[Math.floor(rng()*arr.length)];
          if (t && t !== lastFeedbackText) return t;
        }
        return arr[Math.floor(rng()*arr.length)];
      }

      function showQuestionFeedback(){
        const best = pickStrongestBubble();
        const dur = 1050; // ~1.05s：更清晰可读（含渐入渐出）
        // seeded random per (question + strongest choice + time slice)
        const timeSlice = Math.floor(now() / 2000); // roughly changes every 2s
        const seed = (appSeed ^ (qIndex*1315423911) ^ hashStr((best?best.key:'none') + ':' + timeSlice)) >>> 0;
        const rng = mulberry32(seed);

        let text = '';
        if (!best){
          text = pickFrom(FEEDBACK_POOL.none, rng) || '没关系，慢慢来。';
        } else {
          const tpl = pickFrom(FEEDBACK_POOL[qIndex] || FEEDBACK_POOL[0], rng) || '我听见了：{x}。';
          text = formatFeedback(tpl, best.key);
        }
        lastFeedbackText = text;
        feedbackToast = { text, t0: now(), dur };
        return dur;
      }

      function completeQuestion(){
        if (qTransitioning) return;
        qTransitioning = true;
        recordQuestion();
        const wait = showQuestionFeedback();
        // 防止 render loop 重复触发
        idleAt = 1e18;
        if (qNextTimer) { try{ clearTimeout(qNextTimer); }catch(_){ } }
        qNextTimer = setTimeout(() => {
          qTransitioning = false;
          qIndex++;
          nextQuestion();
        }, wait);
      }

      function finalizeMoodSummary(){
        // pick top 3 across all dimensions
        const entries = [];
        for(let qi=0; qi<QUESTIONS.length; qi++){
          const q = QUESTIONS[qi];
          const baseIdx = qi*8;
          for(let i=0;i<q.opts.length;i++){
            entries.push({ label: q.opts[i], val: user.moodVec[baseIdx+i] || 0 });
          }
        }
        entries.sort((a,b)=>b.val-a.val);
        const top = entries.slice(0,3).filter(x=>x.val>0.05);
        user.moodSummary = top.length ? top.map(x=>`${x.label}·${Math.round(x.val*100)}%`).join(' / ') : '轻轻的、说不清的心情';
      }

      function bubbleHit(x,y){
        let best=null, bestD=1e9;
        for(const b of bubbles){
          const dx=x-b.x, dy=y-b.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if (d < b.r && d < bestD){
            best=b; bestD=d;
          }
        }
        return best;
      }

      canvas.addEventListener('pointerdown', (e) => {
        if (scene !== Scene.QUESTIONS) return;
        if (qTransitioning) return;
        const p = pointerPos(e);
        const hit = bubbleHit(p.x, p.y);
        if (hit){
          hit.clicks++;
          hit.r = hit.base * (1 + Math.min(hit.clicks, 10)*0.12);
          hit.pulse = 1;
          const strength = clamp(hit.clicks/6, 0, 1);
          emitBubbleParticles(hit.x, hit.y, hit.hue, strength);
          emitRipple(hit.x, hit.y, hit.hue, strength);
          lastInteractAt = now();
          idleAt = now() + IDLE_TO_NEXT_MS;
        }
      }, { passive: true });

      // ---------- Scene: User Card ----------
      let cardCanvas = null, cardCtx = null;
      let cardWrap = null;
      function ensureCardCanvas(){
        // 注意：uiLayer / setLayer / clearUI 会通过 innerHTML 重置 DOM，
        // 这会把 cardWrap 从页面里移除，但变量仍然引用旧节点。
        // 因此这里必须保证 cardWrap 既存在又“挂在 DOM 上”，否则海报/小卡片会变成空白。
        if (!cardWrap){
          cardWrap = document.createElement('div');
          cardWrap.id = 'cardWrap';
          const cc = document.createElement('canvas');
          cc.id = 'cardCanvas';
          cardWrap.appendChild(cc);
          cardCanvas = cc;
          cardCtx = cc.getContext('2d');
        } else {
          // 若节点被 innerHTML 清空移除了，重新挂回去
          if (!cardWrap.isConnected){
            // nothing
          }
          // 重新获取 canvas/context（防止浏览器在某些情况下回收）
          const cc = cardWrap.querySelector('canvas') || cardWrap.firstElementChild;
          if (cc && cc !== cardCanvas) cardCanvas = cc;
          if (cardCanvas && !cardCtx) cardCtx = cardCanvas.getContext('2d');
        }
        if (!uiLayer.contains(cardWrap)){
          uiLayer.appendChild(cardWrap);
        }
        // attach poster-earth drag handlers once
        if (cardCanvas && !cardCanvas.dataset.posterDragBound){
          cardCanvas.dataset.posterDragBound = '1';
          cardCanvas.style.touchAction = 'none';
          cardCanvas.addEventListener('pointerdown', onPosterPointerDown, { passive: true });
          cardCanvas.addEventListener('pointermove', onPosterPointerMove, { passive: true });
          cardCanvas.addEventListener('pointerup', onPosterPointerUp, { passive: true });
          cardCanvas.addEventListener('pointercancel', onPosterPointerUp, { passive: true });
        }
      }

      function posterCanvasPos(e){
        const rect = cardCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / Math.max(1, rect.width) * cardCanvas.width;
        const y = (e.clientY - rect.top) / Math.max(1, rect.height) * cardCanvas.height;
        return { x, y };
      }
      function inPosterEarth(x, y){
        if (!posterAnim.ready || scene !== Scene.POSTER) return false;
        const E = posterAnim.earth;
        const dx = x - E.x, dy = y - E.y;
        return (dx*dx + dy*dy) <= (E.r*E.r);
      }
      function onPosterPointerDown(e){
        if (scene !== Scene.POSTER || !posterAnim.ready) return;
        const p = posterCanvasPos(e);
        if (!inPosterEarth(p.x, p.y)) return;
        const E = posterAnim.earth;
        E.dragging = true;
        E.dragId = e.pointerId;
        E.lastX = p.x;
        E.lastY = p.y;
        E.yawVel = 0;
        E.pitchVel = 0;
        try { cardCanvas.setPointerCapture(e.pointerId); } catch(_) {}
      }
      function onPosterPointerMove(e){
        if (scene !== Scene.POSTER || !posterAnim.ready) return;
        const E = posterAnim.earth;
        if (!E.dragging || E.dragId !== e.pointerId) return;
        const p = posterCanvasPos(e);
        const dx = p.x - E.lastX;
        const dy = p.y - E.lastY;
        E.lastX = p.x;
        E.lastY = p.y;
        const s = 0.0052;
        const yaw = dx * s;
        const pitch = -dy * s; // 上下同向
        E.q = quatNormalize(quatMul(
          quatMul(quatFromAxisAngle({x:0,y:1,z:0}, yaw), quatFromAxisAngle({x:1,y:0,z:0}, pitch)),
          E.q
        ));
        E.yawVel = yaw * 0.55;
        E.pitchVel = pitch * 0.55;
      }
      function onPosterPointerUp(e){
        if (scene !== Scene.POSTER || !posterAnim.ready) return;
        const E = posterAnim.earth;
        if (E.dragId !== e.pointerId) return;
        E.dragging = false;
        E.dragId = null;
      }

      function drawUserCardToCanvas(){
        ensureCardCanvas();
        const w = 900, h = 560;
        cardCanvas.width = w;
        cardCanvas.height = h;

        const g = cardCtx.createLinearGradient(0,0,w,h);
        g.addColorStop(0, '#2b1233');
        g.addColorStop(.55, '#1a0f22');
        g.addColorStop(1, '#120b12');
        cardCtx.fillStyle = g;
        cardCtx.fillRect(0,0,w,h);

        // glow shapes
        for(let i=0;i<16;i++){
          const r = 60 + rng()*160;
          const x = rng()*w;
          const y = rng()*h;
          const gg = cardCtx.createRadialGradient(x,y,0,x,y,r);
          gg.addColorStop(0, `rgba(255, 180, 120, ${0.22 + rng()*0.08})`);
          gg.addColorStop(1, 'rgba(0,0,0,0)');
          cardCtx.fillStyle = gg;
          cardCtx.beginPath();
          cardCtx.arc(x,y,r,0,TAU);
          cardCtx.fill();
        }

        // Title
        cardCtx.fillStyle = 'rgba(255,255,255,.92)';
        cardCtx.font = '700 34px "Microsoft YaHei", system-ui';
        cardCtx.fillText('Mood Earth · 同频小卡片', 42, 74);

        // subtitle
        cardCtx.fillStyle = 'rgba(255,233,210,.75)';
        cardCtx.font = '500 18px "Microsoft YaHei", system-ui';
        const place = user.place ? user.place.label : '未知地点';
        const date = new Date();
        const timeStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}  ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        cardCtx.fillText(`${place}｜${timeStr}`, 42, 106);

        // Divider
        cardCtx.strokeStyle = 'rgba(255,255,255,.12)';
        cardCtx.lineWidth = 2;
        cardCtx.beginPath();
        cardCtx.moveTo(42, 132);
        cardCtx.lineTo(w-42, 132);
        cardCtx.stroke();

        // Mood summary
        cardCtx.fillStyle = 'rgba(255,255,255,.92)';
        cardCtx.font = '650 22px "Microsoft YaHei", system-ui';
        cardCtx.fillText('此刻的我：', 42, 175);
        cardCtx.fillStyle = 'rgba(255,207,138,.95)';
        cardCtx.font = '700 26px "Microsoft YaHei", system-ui';
        cardCtx.fillText(user.moodSummary || '轻轻的心情', 170, 176);

        // bars
        const entries = [];
        for(let qi=0; qi<QUESTIONS.length; qi++){
          const q = QUESTIONS[qi];
          const baseIdx = qi*8;
          for(let i=0;i<q.opts.length;i++){
            entries.push({ label: q.opts[i], val: user.moodVec[baseIdx+i] || 0 });
          }
        }
        entries.sort((a,b)=>b.val-a.val);
        const top = entries.slice(0,5);

        const bx = 42, by = 220, bw = w-84, bh = 18, gap = 22;
        cardCtx.font = '500 16px "Microsoft YaHei", system-ui';
        for(let i=0;i<top.length;i++){
          const t = top[i];
          const y = by + i*(bh+gap);
          cardCtx.fillStyle = 'rgba(255,255,255,.78)';
          cardCtx.fillText(t.label, bx, y+bh-2);
          // track
          cardCtx.fillStyle = 'rgba(255,255,255,.10)';
          cardCtx.fillRect(bx+120, y, bw-120, bh);
          // value
          const ww = (bw-120) * clamp(t.val, 0, 1);
          const grad = cardCtx.createLinearGradient(bx+120, y, bx+120+ww, y);
          grad.addColorStop(0, 'rgba(255,207,138,.85)');
          grad.addColorStop(1, 'rgba(255,110,126,.85)');
          cardCtx.fillStyle = grad;
          cardCtx.fillRect(bx+120, y, ww, bh);
          cardCtx.fillStyle = 'rgba(255,233,210,.75)';
          cardCtx.fillText(`${Math.round(t.val*100)}%`, bx + bw - 56, y+bh-2);
        }

        // healing sentence
        const heal = pickHealingSentence();
        cardCtx.fillStyle = 'rgba(255,233,210,.92)';
        cardCtx.font = '600 20px "Microsoft YaHei", system-ui';
        wrapText(cardCtx, `“${heal}”`, 42, h-110, w-84, 28);

        // footer
        cardCtx.fillStyle = 'rgba(255,255,255,.55)';
        cardCtx.font = '500 14px "Microsoft YaHei", system-ui';
        cardCtx.fillText('世界很大，但你不是一个人。', 42, h-36);
      }

      function wrapText(g, text, x, y, maxWidth, lineHeight){
        const words = text.split('');
        let line = '';
        let yy = y;
        for(let i=0;i<words.length;i++){
          const test = line + words[i];
          if (g.measureText(test).width > maxWidth && line){
            g.fillText(line, x, yy);
            line = words[i];
            yy += lineHeight;
          } else {
            line = test;
          }
        }
        if (line) g.fillText(line, x, yy);
      }

      function pickHealingSentence(){
        // based on moodVec total energy
        const energy = (user.moodVec || []).reduce((a,b)=>a+b,0) / 6;
        const calm = (user.moodVec[3]||0) + (user.moodVec[7]||0); // some slots near calm-ish
        if (energy < 0.9) return '先把自己抱稳，再慢慢向前走。';
        if (calm > 0.9) return '你已经在恢复了，温柔会继续生长。';
        return '把今天过成一束光，明天会更清晰。';
      }

      function enterUserCard(){
        scene = Scene.USER_CARD;
        clearUI();
        hidePersonCard(true);
        topHint.textContent = '这是你的专属 Mood Earth 小卡片（可截图保存）';
        ensureCardCanvas();
        drawUserCardToCanvas();
        cardWrap.classList.add('show');
        setBottomButtons([
          { text:'重新选择', secondary:true, onClick: () => { resetUserState(); enterGlobe(); } },
          { text:'寻找同频', onClick: () => enterMatch() },
        ]);
      }

      function resetUserState(){
        user.place = null;
        user.moodVec = null;
        user.moodSummary = '';
        user.leaveMsg = '';
        user.stickerId = null;
        hidePersonCard(true);
        if (cardWrap) cardWrap.classList.remove('show');
      }

      // ---------- Matching ----------
      let match = null;
      let matchPct = 0;
      function cosineSim(a,b){
        let ab=0, aa=0, bb=0;
        const n = Math.max(a.length, b.length);
        for(let i=0;i<n;i++){
          const x = a[i]||0, y=b[i]||0;
          ab += x*y; aa += x*x; bb += y*y;
        }
        if (aa<=1e-9 || bb<=1e-9) return 0;
        return ab / Math.sqrt(aa*bb);
      }
      function haversine(lat1,lon1,lat2,lon2){
        const R = 6371;
        const toR = d => d*Math.PI/180;
        const dLat = toR(lat2-lat1);
        const dLon = toR(lon2-lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
        const c = 2*Math.asin(Math.min(1, Math.sqrt(a)));
        return R*c;
      }
      function findMatch(){
        if (!user.place || !user.moodVec) return null;
        let best=null, bestScore=-1e9;
        for(const p of people){
          const sMood = cosineSim(user.moodVec, embedMoodTo24(p.vec));
          const dist = haversine(user.place.lat, user.place.lon, p.lat, p.lon);
          const sLoc = 1 - clamp(dist/18000, 0, 1); // rough normalize
          const score = 0.82*sMood + 0.18*sLoc;
          if (score > bestScore){
            bestScore = score; best = p;
          }
        }
        // map score to percent
        const pct = Math.round(clamp((bestScore*0.5 + 0.5), 0, 1) * 100);
        return { person: best, pct, score: bestScore };
      }

      function embedMoodTo24(vec3){
        // Expand 3 dims into our 24-d user space with small pattern so cosine works.
        const out = new Array(24).fill(0);
        for(let i=0;i<24;i++){
          const k = i % 3;
          out[i] = vec3[k] * (0.75 + 0.25*((i%8)/7));
        }
        return out;
      }

      function enterMatch(){
        scene = Scene.MATCH;
        clearUI();
        hidePersonCard(true);
        if (cardWrap) cardWrap.classList.remove('show');

        match = findMatch();
        if (!match || !match.person){
          enterGlobe();
          return;
        }
        matchPct = match.pct;
        matchBar.classList.add('show');
        matchPctEl.textContent = `${matchPct}%`;
        matchTitleEl.textContent = '正在旋转寻找同频…';
        topHint.textContent = '你可以拖动地球，但也可以等待它自动停在同频的人附近';

        // start from user place focus, then rotate to match
        setFocus(user.place.lat, user.place.lon, 0.98, 600, () => {
          setTimeout(() => {
            matchTitleEl.textContent = '同频已锁定';
            setFocus(match.person.lat, match.person.lon, 1.02, 2200, () => {
              // pin card near the star when possible
              // We'll show card on next frame via pickStar near match.
            });
          }, 260);
        });

        setBottomButtons([
          { text:'留下些什么...', onClick: openLeaveWords },
          { text:'返回小卡片', secondary:true, onClick: enterUserCard }
        ]);
      }

      function openLeaveWords(){
        const t = document.createElement('div');
        t.className = 'field';
        const lab = document.createElement('label'); lab.textContent = '写下一句疗愈温馨的话（将出现在海报里）';
        const ta = document.createElement('textarea');

        t.appendChild(ta);

        showModal({
          title:'留下些什么…',

          bodyNodes:[t],
          actions:[
            { text:'提交', onClick: () => {
              user.leaveMsg = (ta.value || '').trim().slice(0, 80);
              closeModal();
              enterPoster();
            }},
            { text:'取消', secondary:true, onClick: closeModal }
          ]
        });
      }

      // ---------- Poster + Music ----------
      let audio = { ctx:null, startedAt:0, stopAt:0, isPlaying:false, nodes:[] };
      // Poster animation overlay (dynamic decorative particles)
      const posterAnim = {
        ready: false,
        baseCanvas: null,
        baseCtx: null,
        particles: [],
        rng: null,
        earth: {
          x: 0, y: 0, r: 0,
          q: null,
          yawVel: 0,
          pitchVel: 0,
          dragging: false,
          dragId: null,
          lastX: 0,
          lastY: 0,
        }
      };
      function enterPoster(){
        scene = Scene.POSTER;
        clearUI();
        hidePersonCard(true);
        matchBar.classList.remove('show');
        topHint.textContent = '为你生成一张疗愈海报，并创作一首 30 秒左右的同频歌曲（纯离线合成）';

        setLayer(`
          <h1 class="title" style="font-size:22px; margin-bottom:4px;">疗愈海报</h1>
          <p class="subtitle">你可以截图保存，也可以点“播放歌曲”听听这段为你生成的 30s 同频旋律。</p>
        `);

        ensureCardCanvas();
        cardWrap.classList.add('show');
        // 先画“静态海报底图”（不画球），再用每帧动态绘制可转动的球 + 标记 + 动态粒子
        drawPosterToCanvas({ skipEarth: true });
        initPosterAnim(); // capture static poster + start dynamic overlay

        setBottomButtons([
          { text: audio.isPlaying ? '停止歌曲' : '播放歌曲', onClick: toggleMusic },
          { text:'领取专属贴纸', onClick: enterSticker },
          { text:'重新选择', secondary:true, onClick: () => { stopMusic(true); resetUserState(); enterGlobe(); } },
        ]);
      }

      function initPosterAnim(){
        // Build a base snapshot canvas (poster without earth), then animate:
        // - a rotatable mini earth + geo markers (you + match) to avoid label overlap
        // - decorative particles overlay
        try{
          posterAnim.ready = false;
          posterAnim.particles.length = 0;
          posterAnim.rng = mulberry32(appSeed ^ 0x77a1b2c3);
          const sc = document.createElement('canvas');
          sc.width = cardCanvas.width;
          sc.height = cardCanvas.height;
          const sg = sc.getContext('2d');
          sg.drawImage(cardCanvas, 0, 0);
          posterAnim.baseCanvas = sc;
          posterAnim.baseCtx = sg;
          // earth params (must match drawPosterToCanvas layout)
          posterAnim.earth.x = sc.width * 0.5;
          posterAnim.earth.y = 520;
          posterAnim.earth.r = 220;
          posterAnim.earth.q = miniEarthQuat(); // initial orientation
          posterAnim.earth.yawVel = 0.12;
          posterAnim.earth.pitchVel = 0.02;
          posterAnim.earth.dragging = false;
          // seed particles
          const w = sc.width, h = sc.height;
          for(let i=0;i<160;i++){
            spawnPosterParticle(w, h);
          }
          posterAnim.ready = true;
        }catch(_){
          posterAnim.ready = false;
        }
      }

      function spawnPosterParticle(w, h){
        const r = posterAnim.rng || rng;
        posterAnim.particles.push({
          x: r()*w,
          y: r()*h,
          vx: (r()*2-1) * 10 * DPR,
          vy: -(6 + r()*22) * DPR,
          r: (0.7 + r()*1.8) * DPR,
          hue: 18 + r()*36,
          tw: r()*TAU,
          ttl: 6.5 + r()*7.5,
          t: r()*3.0,
        });
        if (posterAnim.particles.length > 220) posterAnim.particles.shift();
      }

      function updatePosterAnim(){
        if (!posterAnim.ready || scene !== Scene.POSTER) return;
        const g = cardCtx;
        const w = cardCanvas.width, h = cardCanvas.height;
        // restore base
        g.setTransform(1,0,0,1,0,0);
        g.clearRect(0,0,w,h);
        g.drawImage(posterAnim.baseCanvas, 0, 0);

        // update earth rotation (auto spin when not dragging)
        const E = posterAnim.earth;
        if (E.q){
          if (!E.dragging){
            if (Math.abs(E.yawVel) + Math.abs(E.pitchVel) > 1e-5){
              E.q = quatNormalize(quatMul(
                quatMul(quatFromAxisAngle({x:0,y:1,z:0}, E.yawVel * dtSec), quatFromAxisAngle({x:1,y:0,z:0}, E.pitchVel * dtSec)),
                E.q
              ));
              E.yawVel *= 0.995;
              E.pitchVel *= 0.995;
            } else {
              // keep a tiny motion so it feels alive
              E.yawVel = 0.08;
              E.pitchVel = 0.01;
            }
          }
          // draw earth + markers
          const vibe = moodVibe();
          g.save();
          g.translate(E.x, E.y);
          drawPosterEarthGlow(g, 0, 0, 240, vibe);
          drawMiniEarthWithQuat(g, 0, 0, E.r, E.q, vibe);
          drawMiniEarthMarkersWithQuat(g, 0, 0, E.r, E.q, vibe);
          g.restore();
        }

        // update & draw particles
        const ps = posterAnim.particles;
        for(let i=ps.length-1;i>=0;i--){
          const p = ps[i];
          p.t += dtSec;
          if (p.t > p.ttl){
            ps.splice(i,1);
            spawnPosterParticle(w,h);
            continue;
          }
          // slow drift
          p.vx *= 0.995;
          p.vy *= 0.995;
          p.x += p.vx * dtSec;
          p.y += p.vy * dtSec;
          // wrap
          if (p.y < -40*DPR) { p.y = h + 40*DPR; p.x = (posterAnim.rng||rng)()*w; }
          if (p.x < -40*DPR) p.x = w + 40*DPR;
          if (p.x > w + 40*DPR) p.x = -40*DPR;
        }
        // draw
        g.save();
        g.globalCompositeOperation = 'lighter';
        for(const p of ps){
          const u = p.t / p.ttl;
          const a = (1 - u);
          const tw = 0.55 + 0.45*Math.sin(p.tw + p.t*2.6);
          const rr = p.r * (0.9 + 0.8*(1-u));
          const glow = rr * (8 + 10*tw);
          const grad = g.createRadialGradient(p.x, p.y, 0, p.x, p.y, glow);
          grad.addColorStop(0, `hsla(${p.hue}, 95%, 80%, ${0.10*a*tw})`);
          grad.addColorStop(0.35, `hsla(${p.hue+10}, 90%, 70%, ${0.06*a*tw})`);
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          g.fillStyle = grad;
          g.beginPath();
          g.arc(p.x, p.y, glow, 0, TAU);
          g.fill();
          g.fillStyle = `hsla(${p.hue}, 95%, 92%, ${0.22*a*tw})`;
          g.beginPath();
          g.arc(p.x, p.y, rr, 0, TAU);
          g.fill();
        }
        g.restore();
      }

      function drawPosterStars(g, w, h, vibe, r){
        g.save();

        for(let i=0;i<120;i++){
          const x = r()*w;
          const y = r()*h;
          const tw = 0.5 + 0.5*Math.sin((i*0.7 + r()*6) + (performance.now()*0.0006));
          const rad = (0.8 + r()*1.8);
          const glow = 10 + r()*22;
          const grad = g.createRadialGradient(x,y,0,x,y,glow);
          grad.addColorStop(0, `rgba(255,245,235,${0.10 + 0.12*tw})`);
          grad.addColorStop(0.35, `rgba(255,190,140,${0.04 + 0.06*tw})`);
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          g.fillStyle = grad;
          g.beginPath();
          g.arc(x,y,glow,0,TAU);
          g.fill();
          g.fillStyle = `rgba(255,255,255,${0.18 + 0.22*tw})`;
          g.beginPath();
          g.arc(x,y,rad,0,TAU);
          g.fill();

        g.restore();

      function drawPosterConstellation(g, w, h, vibe, r){
        // A few constellations made of points + lines (top half)
        g.save();
        g.globalAlpha = 0.55;
        g.strokeStyle = 'rgba(255,233,210,.18)';
        g.lineWidth = 2;
        for(let k=0;k<3;k++){
          const baseX = 80 + r()*(w-160);
          const baseY = 120 + r()*260;
          const pts = [];
          const n = 4 + Math.floor(r()*3);
          for(let i=0;i<n;i++){
            pts.push({ x: baseX + (r()*180-90), y: baseY + (r()*120-60) });
          }
          pts.sort((a,b)=>a.x-b.x);
          g.beginPath();
          g.moveTo(pts[0].x, pts[0].y);
          for(let i=1;i<pts.length;i++) g.lineTo(pts[i].x, pts[i].y);
          g.stroke();
          for(const p of pts){
            const gg = g.createRadialGradient(p.x,p.y,0,p.x,p.y,18);
            gg.addColorStop(0,'rgba(255,245,235,.35)');
            gg.addColorStop(1,'rgba(0,0,0,0)');
            g.fillStyle = gg;
            g.beginPath();
            g.arc(p.x,p.y,18,0,TAU);
            g.fill();
            g.fillStyle = 'rgba(255,255,255,.55)';
            g.beginPath();
            g.arc(p.x,p.y,2.3,0,TAU);
            g.fill();
          }

        g.restore();

      function drawPosterFrame(g, w, h, vibe){
        g.save();
        // outer frame
        g.strokeStyle = 'rgba(255,255,255,.16)';
        g.lineWidth = 3;
        roundRect(g, 22, 22, w-44, h-44, 26);
        g.stroke();
        // inner frame
        g.strokeStyle = 'rgba(255,207,138,.12)';
        g.lineWidth = 2;
        roundRect(g, 44, 44, w-88, h-88, 22);
        g.stroke();
        // corner accents
        g.globalCompositeOperation = 'lighter';
        g.strokeStyle = 'rgba(255,207,138,.28)';
        g.lineWidth = 4;
        const L = 46;
        const corners = [
          {x:44,y:44, sx:1, sy:1},
          {x:w-44,y:44, sx:-1, sy:1},
          {x:44,y:h-44, sx:1, sy:-1},
          {x:w-44,y:h-44, sx:-1, sy:-1},
        ];
        for(const c of corners){
          g.beginPath();
          g.moveTo(c.x, c.y);
          g.lineTo(c.x + c.sx*L, c.y);
          g.stroke();
          g.beginPath();
          g.moveTo(c.x, c.y);
          g.lineTo(c.x, c.y + c.sy*L);
          g.stroke();
        }
        g.restore();
      }

      function roundRect(g,x,y,w,h,r){
        const rr = Math.min(r, w/2, h/2);
        g.beginPath();
        g.moveTo(x+rr,y);
        g.arcTo(x+w,y,x+w,y+h,rr);
        g.arcTo(x+w,y+h,x,y+h,rr);
        g.arcTo(x,y+h,x,y,rr);
        g.arcTo(x,y,x+w,y,rr);
        g.closePath();
      }

      function moodVibe(){
        // derive a palette from mood energy and calmness
        const v = user.moodVec || [];
        const energy = (v.reduce((a,b)=>a+b,0) / 6) || 0.8;
        const calm = (v[3]||0) + (v[7]||0) + (v[11]||0);
        const warm = clamp(0.55 + energy*0.25 - calm*0.15, 0.35, 0.85);
        const pink = clamp(0.35 + energy*0.25, 0.25, 0.75);
        const bg0 = `hsl(${Math.round(280 - warm*80)}, 45%, ${Math.round(12 + warm*6)}%)`;
        const bg1 = `hsl(${Math.round(320 - warm*60)}, 52%, ${Math.round(10 + pink*9)}%)`;
        const bg2 = `hsl(${Math.round(20 + warm*12)}, 55%, ${Math.round(8 + warm*7)}%)`;
        const glowRGB = `${Math.round(255)}, ${Math.round(176 + warm*30)}, ${Math.round(120 + pink*60)}`;
        return { bg0,bg1,bg2, glowRGB };
      }

      function drawMiniEarth(g, x, y, r, vibe){
        return drawMiniEarthWithQuat(g, x, y, r, miniEarthQuat(), vibe);
      }

      function drawMiniEarthWithQuat(g, x, y, r, qMini, vibe){
        // simple shaded sphere (with supplied quaternion)
        const grad = g.createRadialGradient(x - r*0.25, y - r*0.25, r*0.15, x, y, r*1.05);
        grad.addColorStop(0, 'rgba(255,240,220,.92)');
        grad.addColorStop(.35, 'rgba(255,195,145,.78)');
        grad.addColorStop(1, 'rgba(140,60,75,.92)');
        g.beginPath();
        g.arc(x,y,r,0,TAU);
        g.fillStyle = grad;
        g.fill();
        // 始终使用“点阵大陆”路径（优先 isLandMask，避免 file:// / 浏览器策略差异导致变成贴图）
        const light = normalize({x:-0.6, y:-0.25, z: 1});
        const latSteps = 22;
        const lonSteps = 34;
        const dotSize = Math.max(2.2, Math.min(6.5, r*0.022));
        const oceanDot = { r: 26, g: 52, b: 120 };
        const landA = { r: 70, g: 170, b: 92 };
        const landB = { r: 255, g: 214, b: 160 };
        const ice   = { r: 245, g: 245, b: 248 };
        for(let il=0; il<latSteps; il++){
          const lat = lerp(-88, 88, il/(latSteps-1));
          const latR = lat*Math.PI/180;
          for(let io=0; io<lonSteps; io++){
            const lon = lerp(-180, 180, io/(lonSteps-1));
            const lonR = lon*Math.PI/180;
            const baseV = latLonToVec(latR, lonR);
            const vv = quatRotateVec(qMini, baseV);
            if (vv.z < 0) continue;
            const p = project(vv, x, y, r);
            const ndl = clamp(dot(normalize(vv), light)*0.5 + 0.55, 0, 1);

            const land = isLandStable(lat, lon);
            const oceanKeep = ((il + io) % 3 === 0);
            const landKeep = ((il + io) % 2 === 0);
            if (!land && !oceanKeep) continue;
            if (land && !landKeep) continue;

            const shade = 0.58 + 0.52*ndl;
            if (land){
              const isIce = Math.abs(lat) > 72; // 简单的极地冰雪风格
              const tMix = clamp((0.55 - Math.abs(lat)/90) * 0.65 + ndl*0.35, 0, 1);
              const c = isIce ? ice : lerpColor(landA, landB, tMix);
              const rr = Math.round(c.r * shade);
              const gg = Math.round(c.g * shade);
              const bb = Math.round(c.b * shade);
              g.fillStyle = `rgba(${rr},${gg},${bb},${0.90})`;
              g.fillRect(p.x, p.y, dotSize, dotSize);
            } else {
              const rr = Math.round(oceanDot.r * (0.55 + 0.45*ndl));
              const gg = Math.round(oceanDot.g * (0.55 + 0.45*ndl));
              const bb = Math.round(oceanDot.b * (0.55 + 0.45*ndl));
              g.fillStyle = `rgba(${rr},${gg},${bb},${0.30})`;
              g.fillRect(p.x, p.y, dotSize*0.8, dotSize*0.8);
            }
          }
        }
        // gloss
        const gloss = g.createRadialGradient(x - r*0.35, y - r*0.35, 0, x - r*0.2, y - r*0.2, r*0.9);
        gloss.addColorStop(0, 'rgba(255,255,255,.24)');
        gloss.addColorStop(1, 'rgba(255,255,255,0)');
        g.fillStyle = gloss;
        g.beginPath();
        g.arc(x,y,r,0,TAU);
        g.fill();
      }

      function miniEarthQuat(){
        // Must match drawMiniEarth's internal rotation so markers align
        return quatNormalize(quatMul(
          quatFromAxisAngle({x:0,y:1,z:0}, -0.8),
          quatFromAxisAngle({x:1,y:0,z:0}, 0.2)
        ));
      }

      function drawMiniEarthMarkers(g, x, y, r, vibe){
        return drawMiniEarthMarkersWithQuat(g, x, y, r, miniEarthQuat(), vibe);
      }

      function drawMiniEarthMarkersWithQuat(g, x, y, r, q, vibe){
        if (!user.place && !(match && match.person)) return;
        const items = [];
        if (user.place) items.push({ label:'你', sub: user.place.label, lat:user.place.lat, lon:user.place.lon, col:'#ffcf8a' });
        if (match && match.person) items.push({ label:'同频', sub: `${match.person.name}·${match.person.region}`, lat:match.person.lat, lon:match.person.lon, col:'#ff8a9a' });

        const pts = [];
        for(const it of items){
          const v = latLonToVec(it.lat*Math.PI/180, it.lon*Math.PI/180);
          const vv = quatRotateVec(q, v);
          if (vv.z < 0.02) continue; // behind
          const p = project(vv, x, y, r);
          pts.push({ it, vv, p });
        }
        if (!pts.length) return;

        g.save();
        g.globalCompositeOperation = 'lighter';
        // optional link line between two points when both visible
        if (pts.length >= 2){
          const a = pts[0].p, b = pts[1].p;
          g.strokeStyle = 'rgba(255,233,210,.16)';
          g.lineWidth = 2;
          g.beginPath();
          g.moveTo(a.x, a.y);
          g.quadraticCurveTo(0, -r*0.15, b.x, b.y);
          g.stroke();
        }
        // dots + callouts
        for(const pp of pts){
          const {it, p, vv} = pp;
          const dotR = (4.0 + 4.0*vv.z) * DPR;
          const glowR = dotR * 7.0;
          const grad = g.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
          grad.addColorStop(0, hexToRgba(it.col, 0.65));
          grad.addColorStop(0.35, hexToRgba(it.col, 0.22));
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          g.fillStyle = grad;
          g.beginPath();
          g.arc(p.x, p.y, glowR, 0, TAU);
          g.fill();
          g.fillStyle = hexToRgba(it.col, 0.92);
          g.beginPath();
          g.arc(p.x, p.y, dotR, 0, TAU);
          g.fill();

          // label box
          const dir = normalize({x:p.x - x, y:p.y - y, z:0});
          const lx = p.x + dir.x * (26*DPR);
          const ly = p.y + dir.y * (26*DPR);
          const bx = lx + (dir.x >= 0 ? 18*DPR : -18*DPR);
          const by = ly + (dir.y >= 0 ? 10*DPR : -10*DPR);
          g.strokeStyle = 'rgba(255,255,255,.20)';
          g.lineWidth = 2;
          g.beginPath();
          g.moveTo(p.x, p.y);
          g.lineTo(lx, ly);
          g.lineTo(bx, by);
          g.stroke();
        }
        g.restore();

        // draw text callouts in normal mode (to keep crisp)
        g.save();
        g.textAlign = 'left';
        g.textBaseline = 'top';
        g.font = `700 ${Math.round(16*DPR)}px "Microsoft YaHei", system-ui`;
        for(const pp of pts){
          const {it, p} = pp;
          const dir = normalize({x:p.x - x, y:p.y - y, z:0});
          const lx = p.x + dir.x * (26*DPR);
          const ly = p.y + dir.y * (26*DPR);
          const bx = lx + (dir.x >= 0 ? 18*DPR : -150*DPR);
          const by = ly + (dir.y >= 0 ? 10*DPR : -44*DPR);
          const bw = 152*DPR;
          const bh = 52*DPR;
          // panel
          g.save();
          g.globalAlpha = 0.88;
          g.fillStyle = 'rgba(12,6,20,.55)';
          g.strokeStyle = 'rgba(255,255,255,.16)';
          g.lineWidth = 2;
          roundRect(g, bx, by, bw, bh, 14*DPR);
          g.fill();
          g.stroke();
          g.restore();
          g.fillStyle = 'rgba(255,255,255,.92)';
          g.fillText(it.label, bx + 12*DPR, by + 10*DPR);
          g.font = `500 ${Math.round(12*DPR)}px "Microsoft YaHei", system-ui`;
          g.fillStyle = 'rgba(255,233,210,.72)';
          // clamp sub text
          const sub = (it.sub || '').slice(0, 14);
          g.fillText(sub, bx + 12*DPR, by + 30*DPR);
          g.font = `700 ${Math.round(16*DPR)}px "Microsoft YaHei", system-ui`;
        }
        g.restore();
      }

      function hexToRgba(hex, a){
        // hex like #ffcf8a
        const h = hex.replace('#','').trim();
        const r = parseInt(h.slice(0,2),16);
        const g = parseInt(h.slice(2,4),16);
        const b = parseInt(h.slice(4,6),16);
        return `rgba(${r},${g},${b},${a})`;
      }

      // ---------- Sticker ----------
      const STICKER_COUNT = 24;
      const STICKER_DIR = './stickers/';

      function ensureStickerAssigned(){
        if (!user.stickerId){
          const placeKey = user.place ? `${user.place.label}:${user.place.lat.toFixed(2)},${user.place.lon.toFixed(2)}` : 'unknown';
          const moodKey = (user.moodVec || []).map(v => Math.round((v || 0) * 1000)).join(',');
          const matchKey = (match && match.person) ? `${match.person.id}:${match.person.name}:${matchPct}` : 'none';
          const seed = hashStr(`${appSeed}|${placeKey}|${moodKey}|${matchKey}`);
          user.stickerId = (seed % STICKER_COUNT) + 1;
        }
        return user.stickerId;
      }

      function stickerNoText(){
        return String(ensureStickerAssigned()).padStart(2, '0');
      }

      function stickerAssetPath(no = stickerNoText()){
        return `${STICKER_DIR}${String(no).padStart(2, '0')}.png`;
      }

      function updateStickerCode(){
        const el = document.getElementById('stickerNo');
        if (el) el.textContent = stickerNoText();
      }

      function checkStickerAsset(no = stickerNoText()){
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(stickerAssetPath(no));
          img.onerror = () => reject(new Error(`missing sticker ${no}`));
          img.src = stickerAssetPath(no);

            </div>
