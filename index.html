      function showStickerDownloadHelp(no = stickerNoText()){
        showModal({
          title:'贴纸原图没有找到',
          desc:`请确认项目目录里存在 stickers/${String(no).padStart(2, '0')}.png，并且文件名是两位数字编号。`,
          bodyNodes:[
            Object.assign(document.createElement('div'), { className:'small', textContent:'下载按钮会直接下载这张原始 PNG，不会经过 canvas，也不会压缩或改字。' })

      function downloadStickerPng(){
        const no = stickerNoText();
        const url = stickerAssetPath(no);
        checkStickerAsset(no).then(() => {
          const a = document.createElement('a');
          a.href = url;

      function toggleMusic(){
        if (audio.isPlaying) stopMusic();
        else startMusic();
        // refresh button label
        if (scene === Scene.POSTER){
          setBottomButtons([
            { text: audio.isPlaying ? '停止歌曲' : '播放歌曲', onClick: toggleMusic },
            { text:'领取专属贴纸', onClick: enterSticker },
            { text:'重新选择', secondary:true, onClick: () => { stopMusic(true); resetUserState(); enterGlobe(); } },
          ]);
        }
      }

      function startMusic(){
        // Must be triggered by user gesture.
        stopMusic(true);
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        let ac = null;
        try{
          ac = new AC({ latencyHint:'interactive' });
        }catch(e){
          // 某些设备可能因权限/资源不足导致创建失败
          topHint.textContent = '音乐启动失败：无法创建音频引擎（AudioContext）。';
          return;
        }
        // 某些浏览器/安卓 WebView 会把新建的 AudioContext 置为 suspended，这里主动 resume
        const ensureRunning = () => {
          try{
            if (ac && ac.state !== 'running' && ac.resume) ac.resume();
          }catch(_){}
          // 如果仍未 running，提示用户再点击一次（常见于移动端策略）
          if (ac && ac.state !== 'running'){
            topHint.textContent = '提示：系统可能阻止了音频，请再点一次屏幕/“播放歌曲”（并确认媒体音量未静音）。';
            // 绑定一次性的“任意点击恢复音频”
            const onceResume = () => {
              try{ ac.resume && ac.resume(); }catch(_){}
            };
            try{ window.addEventListener('pointerdown', onceResume, { once:true, passive:true }); }catch(_){}
          }
        };
        ensureRunning();
        // 再次异步确认（避免某些环境 resume 需要一点时间）
        setTimeout(() => {
          try{
            if (ac && ac.state !== 'running'){
              topHint.textContent = '提示：音频仍未激活，请再点击一次屏幕（或检查手机/系统媒体音量）。';
            }
          }catch(_){}
        }, 220);
        audio.ctx = ac;
        audio.nodes = [];
        audio.startedAt = ac.currentTime;
        audio.isPlaying = true;

        const master = ac.createGain();
        master.gain.value = 0.62;
        const masterLowCut = ac.createBiquadFilter();
        masterLowCut.type = 'highpass';
        masterLowCut.frequency.value = 150;
        masterLowCut.Q.value = 0.65;
        const masterAir = ac.createBiquadFilter();
        masterAir.type = 'highshelf';
        masterAir.frequency.value = 3600;
        masterAir.gain.value = 1.4;
        const comp = ac.createDynamicsCompressor();
        comp.threshold.value = -16;
        comp.knee.value = 24;
        comp.ratio.value = 2.2;
        comp.attack.value = 0.018;
        comp.release.value = 0.22;
        master.connect(masterLowCut).connect(masterAir).connect(comp).connect(ac.destination);
        audio.nodes.push(master, masterLowCut, masterAir, comp);

        // reverb
        const convolver = ac.createConvolver();
        convolver.buffer = makeImpulse(ac, 1.25, 3.1);
        const revGain = ac.createGain();
        revGain.gain.value = 0.16;
        convolver.connect(revGain).connect(master);
        audio.nodes.push(convolver, revGain);

        // mood -> “音乐画像”（会根据用户心理状态明显变化：速度/调式/和声/节奏密度/音色）
        // 每次点击“播放”都生成一个独立随机盐值 → 同一心理状态也能生成不同旋律/编曲
        let playSalt = 0;
        try{
          const u = new Uint32Array(1);
          // ⚠️ 不能直接引用 crypto（有些环境 crypto 未定义会直接抛 ReferenceError）
          (window.crypto && window.crypto.getRandomValues)
            ? window.crypto.getRandomValues(u)
            : (u[0] = (Math.random()*0xffffffff)>>>0);
          playSalt = u[0] >>> 0;
        } catch(_){
          playSalt = (Math.random()*0xffffffff)>>>0;
        }
        audio.playSalt = playSalt;

        let profile = null;
        try{
          profile = deriveMusicProfile(playSalt);
        }catch(e){
          topHint.textContent = '音乐启动失败：生成参数出错。';
          console.error(e);
          return;
        }
        // 用一个“歌曲编号/风格”提示你：不同心理状态应该对应不同的 songId
        try{
          const sid = profile.songId ? `#${profile.songId}` : '';
          topHint.textContent = `歌曲${sid} · ${profile.tag} · ${Math.round(profile.tempo||0)}BPM`;
        }catch(_){}
        const tempo = profile.tempo;
        const beat = 60 / tempo;
        const start = ac.currentTime + 0.05;

        // 歌曲时长：根据 tempo 自动取 bar 数，尽量贴近 30s
        const bars = clamp(Math.round(30 / (4*beat)), 7, 14);
        const songLen = bars * 4 * beat;
        audio.stopAt = audio.startedAt + songLen + 0.8;

        // reverb mix by profile
        revGain.gain.value = profile.reverbMix;

        // delay (轻量回声，让旋律更“像歌”、更有空间感)
        const delaySend = ac.createGain();
        delaySend.gain.value = (profile.delay && profile.delay.enabled) ? (profile.delay.mix || 0.18) : 0.0;
        const delay = ac.createDelay(1.2);
        const fb = ac.createGain();
        fb.gain.value = (profile.delay && profile.delay.enabled) ? (profile.delay.feedback || 0.16) : 0.0;
        delay.delayTime.value = beat * ((profile.delay && profile.delay.timeMul) ? profile.delay.timeMul : 0.75);
        const delayTone = ac.createBiquadFilter();
        delayTone.type = 'highpass';
        delayTone.frequency.value = 520;
        delayTone.Q.value = 0.55;
        delaySend.connect(delay);
        delay.connect(delayTone);
        delayTone.connect(fb).connect(delay);
        delayTone.connect(master);
        audio.nodes.push(delaySend, delay, delayTone, fb);

        // --- Drums / Bass / Pad / Melody / (optional Arp) ---
        if (profile.drums && profile.drums.enabled){
          scheduleDrums(ac, master, convolver, start, beat, bars, profile);
        }
        if (profile.perc && profile.perc.enabled){
          schedulePerc(ac, master, convolver, delaySend, start, beat, bars, profile);
        }
        scheduleBass(ac, master, convolver, start, beat, bars, profile);
        schedulePad(ac, master, convolver, start, beat, bars, profile);
        scheduleMelody(ac, master, convolver, delaySend, start, beat, bars, profile);
        if (profile.arp && profile.arp.enabled){
          scheduleArp(ac, master, convolver, delaySend, start, beat, bars, profile);
        }
        if (profile.counter && profile.counter.enabled){
          scheduleCounter(ac, master, convolver, delaySend, start, beat, bars, profile);
        }
        if (profile.sparkle && profile.sparkle.enabled){
          scheduleSparkle(ac, master, convolver, delaySend, start, beat, bars, profile);
        }
        // pop 的“节奏分解和弦”层（像钢琴/吉他扫弦，填满空隙）
        scheduleChops(ac, master, convolver, delaySend, start, beat, bars, profile);

        // fade out
        master.gain.setValueAtTime(master.gain.value, audio.stopAt - 1.6);
        master.gain.linearRampToValueAtTime(0.0001, audio.stopAt);

        // auto-stop (no timers that create network)
        setTimeout(() => {
          stopMusic();
          if (scene === Scene.POSTER){
            setBottomButtons([
              { text: audio.isPlaying ? '停止歌曲' : '播放歌曲', onClick: toggleMusic },
              { text:'领取专属贴纸', onClick: enterSticker },
              { text:'重新选择', secondary:true, onClick: () => { stopMusic(true); resetUserState(); enterGlobe(); } },
            ]);
          }
        }, Math.round((songLen + 1.2) * 1000));
      }

      function stopMusic(forceClose=false){
        audio.isPlaying = false;
        if (audio.ctx){
          try{
            // try stop all created oscillators
            for(const n of audio.nodes){
              try{ n.stop && n.stop(); }catch(_){}
              try{ n.disconnect && n.disconnect(); }catch(_){}
            }
          }catch(_){}
          try{ forceClose && audio.ctx.close(); }catch(_){}
        }
        audio.ctx = null;
        audio.nodes = [];
      }

      function deriveMusicProfile(playSalt = 0){
        // user.moodVec slots:
        // Q1: 0..5 迷茫/孤独/焦虑/平静/兴奋/想被理解
        // Q2: 8..13 陪伴/安静/鼓励/方向/释放/被看见
        // Q3: 16..20 低电量/有点累/刚刚好/满格/过载
        const v = user.moodVec || [];
        const topChoice = (startIdx, labels) => {
          let bi = 0, bv = -1;
          for(let i=0;i<labels.length;i++){
            const val = v[startIdx + i] || 0;
            if (val > bv){ bv = val; bi = i; }
          }
          return { idx: bi, label: labels[bi] || '', val: Math.max(0, bv) };
        };
        const q1 = topChoice(0,  ['迷茫','孤独','焦虑','平静','兴奋','想被理解']);
        const q2 = topChoice(8,  ['陪伴','安静','鼓励','方向','释放','被看见']);
        const q3 = topChoice(16, ['低电量','有点累','刚刚好','满格','过载']);
        const confused = v[0]||0;
        const lonely = v[1]||0;
        const anxious = v[2]||0;
        const calm = (v[3]||0) + (v[9]||0)*0.8 + (v[17]||0)*0.35;
        const excited = (v[4]||0) + (v[19]||0)*0.9 + (v[20]||0)*0.8;
        const understood = v[5]||0;
        const needCompany = v[8]||0;
        const needQuiet = v[9]||0;
        const needEnc = v[10]||0;
        const needDir = v[11]||0;
        const needRelease = v[12]||0;
        const needSeen = v[13]||0;
        const low = v[16]||0, tired = v[17]||0, ok = v[18]||0, full = v[19]||0, overload = v[20]||0;

        // energy estimate (0..1.2)
        const energy = clamp(
          0.15 + full*0.85 + ok*0.55 + overload*1.0 - low*0.7 - tired*0.45,
          0, 1.2
        );
        const tension = clamp(anxious*0.85 + overload*0.6 + needRelease*0.55 + confused*0.25, 0, 1.4);
        const softness = clamp((needQuiet + calm*0.7 + ok*0.3) - tension*0.25, 0, 1.4);
        const warmth = clamp(understood*0.55 + needCompany*0.55 + needSeen*0.45 + lonely*0.35, 0, 1.4);

        // pick a tag (6 archetypes)
        let tag = 'calm';
        if (excited > 0.75 || energy > 0.95) tag = 'spark';
        else if (tension > 0.92) tag = 'release';
        else if (lonely + needCompany + warmth > 1.05) tag = 'hug';
        else if (confused + needDir > 0.85) tag = 'compass';
        else if (needEnc > 0.75) tag = 'rise';
        else if (softness > 0.85) tag = 'calm';

        // base params by tag
        const presets = {
          calm: {
            tempo: 78, mode:'major', rootMidi: 60, // C
            scale: [0,2,4,7,9], // major pentatonic（更“治愈但不犯困”）
            brightness: 0.42,
            reverbMix: 0.20,
            drums:{ enabled:false, style:'soft' },
            bass:{ pattern:[0,4,2,4, 0,5,2,4], step:1.0 },
            pad:{ chordProg:[0,4,5,2, 0,4,5,1], voicing:'add9' },
            melody:{ density:0.42, style:'bell', step:0.5 }
          },
          hug: {
            tempo: 92, mode:'major', rootMidi: 62, // D
            scale: [0,2,4,5,7,9,11], // major（更欢快一点）
            brightness: 0.52,
            reverbMix: 0.18,
            drums:{ enabled:true, style:'brush' },
            bass:{ pattern:[0,5,3,5, 0,4,5,3], step:0.5 },
            pad:{ chordProg:[0,5,3,4, 0,5,4,3], voicing:'sus2' },
            melody:{ density:0.62, style:'shimmer', step:0.25 },
            arp:{ enabled:true, rate:0.5 }
          },
          release: {
            tempo: 112, mode:'minor', rootMidi: 57, // A
            scale: [0,2,3,5,7,9,10], // dorian-ish（更“向上/不阴郁”）
            brightness: 0.55,
            reverbMix: 0.16,
            drums:{ enabled:true, style:'drive' },
            bass:{ pattern:[0,3,5,7, 0,5,7,3], step:0.5 },
            pad:{ chordProg:[0,6,3,4, 0,6,4,3], voicing:'triad' },
            melody:{ density:0.72, style:'pluck', step:0.25 },
            arp:{ enabled:true, rate:0.25 }
          },
          spark: {
            tempo: 122, mode:'major', rootMidi: 67, // G
            scale: [0,2,4,5,7,9,11], // major
            brightness: 0.82,
            reverbMix: 0.14,
            drums:{ enabled:true, style:'four' },
            bass:{ pattern:[0,4,5,4, 5,4,2,4], step:0.5 },
            pad:{ chordProg:[0,4,5,3, 0,4,1,5], voicing:'triad' },
            melody:{ density:0.78, style:'shimmer', step:0.25 },
            arp:{ enabled:true, rate:0.25 }
          },
          compass: {
            tempo: 96, mode:'minor', rootMidi: 59, // B
            scale: [0,2,3,5,7,9,10], // dorian-ish（探索但不压抑）
            brightness: 0.48,
            reverbMix: 0.18,
            drums:{ enabled:true, style:'steady' },
            bass:{ pattern:[0,2,5,2, 5,4,2,4], step:0.5 },
            pad:{ chordProg:[0,2,5,4, 0,2,4,1], voicing:'add9' },
            melody:{ density:0.66, style:'pluck', step:0.25 },
            arp:{ enabled:true, rate:0.5 }
          },
          rise: {
            tempo: 110, mode:'major', rootMidi: 64, // E
            scale: [0,2,4,5,7,9,11],
            brightness: 0.74,
            reverbMix: 0.16,
            drums:{ enabled:true, style:'steady' },
            bass:{ pattern:[0,4,5,2, 0,5,4,2], step:0.5 },
            pad:{ chordProg:[0,5,4,3, 0,5,2,4], voicing:'sus2' },
            melody:{ density:0.74, style:'shimmer', step:0.25 },
            arp:{ enabled:true, rate:0.5 }
          }
        };

        const p = presets[tag] || presets.calm;

        // gently personalize by mood strengths
        // 让整体更“欢快”：整体 tempo 上移，并随能量再上推
        const tempo = clamp(Math.round(p.tempo + 6 + (energy-0.55)*22 - softness*2 + tension*1.5), 72, 138);
        const brightness = clamp(p.brightness + energy*0.18 + softness*0.10 - tension*0.10, 0.18, 0.92);
        const reverbMix = clamp(p.reverbMix + softness*0.05 - tension*0.05, 0.10, 0.28);

        // deterministic seed per user mood (so different mood => different melody)
        let moodHash = 0;
        for(let i=0;i<Math.min(24, v.length);i++){
          moodHash = (moodHash + ((i+7) * Math.floor((v[i]||0)*1000))) >>> 0;
          moodHash = ((moodHash << 5) | (moodHash >>> 27)) >>> 0;
        }
        // 让“不同心理状态”更明显地产生不同音乐：把每题的主选择也作为签名参与种子
        const sig = `${tag}|${q1.label}|${q2.label}|${q3.label}|${tempo}|${(playSalt>>>0).toString(16)}`;
        const baseSeed = (appSeed ^ moodHash ^ hashStr(sig)) >>> 0;
        const seed = (baseSeed ^ (playSalt>>>0)) >>> 0;
        const rr = mulberry32(seed ^ 0x51f0aa55);

        // 关键/调性：由第 1 题主选择决定（让不同情绪更“听得出来”）
        const rootByQ1 = {
          '迷茫': 59,     // B
          '孤独': 62,     // D
          '焦虑': 57,     // A
          '平静': 60,     // C
          '兴奋': 67,     // G
          '想被理解': 64  // E
        };
        const shiftByQ2 = { '陪伴': 0, '安静': -2, '鼓励': 2, '方向': 0, '释放': -5, '被看见': 5 };
        let rootMidi = (rootByQ1[q1.label] != null ? rootByQ1[q1.label] : p.rootMidi);
        rootMidi = clamp(rootMidi + (shiftByQ2[q2.label] || 0), 52, 72);
        // 让同一个 tag 也会出现不同走向：随机旋转/轻微变体和声进行
        const chordProg = ((presets[tag]||presets.calm).pad && (presets[tag]||presets.calm).pad.chordProg)
          ? (presets[tag]||presets.calm).pad.chordProg.slice()
          : [0,5,3,4, 0,5,4,3];
        const rot = Math.floor(rr()*chordProg.length);
        const chordProg2 = chordProg.slice(rot).concat(chordProg.slice(0, rot));
        if (rr() < 0.18) { // small surprise
          const j = Math.floor(rr()*chordProg2.length);
          chordProg2[j] = (chordProg2[j] + (rr()<0.5 ? 1 : -1) + 7) % 7;
        }

        // 用户偏好：更像“流行歌”的走向（旋律更主导 + 更常见的流行和声进行）
        const genre = 'pop';
        const songId = (hashStr(sig) >>> 0).toString(16).padStart(8,'0').slice(0,6);

        return {
          tag,
          genre,
          songId,
          seed,
          tempo,
          mode: p.mode,
          rootMidi,
          scale: p.scale.slice(),
          brightness,
          reverbMix,
          drums: p.drums,
          // pop：即使 calm 也给一点点律动（很轻），避免太空
          perc: Object.assign({ enabled: true, density: (tag==='calm') ? 0.35 : ((tag==='spark'||tag==='release') ? 1.0 : 0.75) }, (p.perc||{})),
          bass: p.bass,
          pad: Object.assign({}, p.pad || {}, { chordProg: chordProg2 }),
          melody: p.melody,
          arp: p.arp || { enabled:false },
          // pop：副旋律/点缀更多出现在副歌段落（更像“歌”的结构）
          counter: Object.assign({ enabled: true, density: 0.55 }, (p.counter||{})),
          sparkle: Object.assign({ enabled: true, density: 0.42 }, (p.sparkle||{})),
          delay: Object.assign({ enabled:true, timeMul:0.75, mix:0.10, feedback:0.14 }, (p.delay||{}))
        };
      }

      // ---------- Extra layers (让音乐不单调) ----------
      function isChorusBar(bar, bars){
        // 简单副歌划分：8bars 时通常 4-7 为副歌；更长时最后 4 bars 也当副歌
        if (bars >= 8){
          if (bar >= 4 && bar <= 7) return true;
          if (bar >= bars - 4) return true;
          return false;
        }
        return bar >= Math.floor(bars*0.5);
      }
      function schedulePerc(ac, master, reverb, delaySend, start, beat, bars, profile){
        // airy ticks + tiny claps. Keep noise very short and high-passed so it never becomes a low rumble.
        const dens = (profile.perc && profile.perc.density) ? profile.perc.density : 0.8;
        const g = ac.createGain();
        g.gain.value = 0.045 + (profile.brightness||0.5)*0.035;
        g.connect(master);
        g.connect(reverb);
        if (delaySend) g.connect(delaySend);
        const localRng = mulberry32(profile.seed ^ 0x6d2b79f5);
        const rate = (profile.tag==='spark' ? 0.25 : 0.5); // 16ths or 8ths in beat units
        const stepsPerBar = Math.round(4 / rate);
        for(let bar=0; bar<bars; bar++){
          for(let step=0; step<stepsPerBar; step++){
            const t = start + (bar*4 + step*rate) * beat;
            const onOff = (step % 2 === 1);
            const p = (onOff ? 0.82 : 0.58) * dens;
            if (localRng() < p){
              shaker(ac, g, t, Math.min(0.035, beat*rate*0.18), 9200 + (localRng()*1800));
            }
            // pop：副歌的 clap 更明确；主歌更克制
            const clapProb = isChorusBar(bar, bars) ? (0.72*dens) : (0.38*dens);
            if ((step === Math.round(1/rate) || step === Math.round(3/rate)) && localRng() < clapProb){
              clap(ac, g, t + beat*0.02, 0.055 + localRng()*0.025);
            }
          }
        }
      }

      function shaker(ac, out, t, dur, freq){
        const noise = ac.createBufferSource();
        noise.buffer = whiteNoise(ac, dur);
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.setValueAtTime(freq, t);
        hp.Q.value = 0.7;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.18, t+0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        noise.connect(hp).connect(g).connect(out);
        noise.start(t); noise.stop(t+dur+0.02);
        audio.nodes.push(noise, hp, g);
      }

      function clap(ac, out, t, dur){
        const noise = ac.createBufferSource();
        noise.buffer = whiteNoise(ac, dur);
        const bp = ac.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.setValueAtTime(2400, t);
        bp.Q.value = 1.2;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.22, t+0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        noise.connect(bp).connect(g).connect(out);
        noise.start(t); noise.stop(t+dur+0.02);
        audio.nodes.push(noise, bp, g);
      }

      function scheduleCounter(ac, master, reverb, delaySend, start, beat, bars, profile){
        // counter melody: soft glass lead with tiny vibrato, sparse but catchy
        const dens = (profile.counter && profile.counter.density) ? profile.counter.density : 0.4;
        const g = ac.createGain();
        g.gain.value = 0.035 + (profile.brightness||0.5)*0.035;
        const hasPan = !!ac.createStereoPanner;
        let out = g;
        if (hasPan){
          const pan = ac.createStereoPanner();
          pan.pan.value = (profile.tag==='spark') ? 0.35 : -0.25;
          g.connect(pan);
          pan.connect(master);
          pan.connect(reverb);
          if (delaySend) pan.connect(delaySend);
          audio.nodes.push(g, pan);
          out = pan;
        } else {
          g.connect(master); g.connect(reverb); if (delaySend) g.connect(delaySend);
          audio.nodes.push(g);
        }
        const localRng = mulberry32(profile.seed ^ 0x8f1bbcdc);
        const scale = profile.scale;
        const root = profile.rootMidi;
        const stepBeats = 0.5;
        const stepsPerBar = 8;
        for(let bar=0; bar<bars; bar++){
          // pop：副歌才“出副旋律”，主歌不要抢主旋律
          if (!isChorusBar(bar, bars) && localRng() < 0.72) continue;
          for(let step=0; step<stepsPerBar; step++){
            const t0 = start + (bar*4 + step*stepBeats) * beat;
            if (localRng() > dens) continue;
            const deg = (step*2 + Math.floor(localRng()*3)) % scale.length;
            const midi = root + 24 + scale[deg] + (localRng()<0.25 ? 12 : 0);
            counterLead(ac, out, t0 + (localRng()*2-1)*beat*0.02, beat*0.35, midi, profile.brightness||0.5);
          }
        }
      }

      function counterLead(ac, out, t, dur, midi, brightness){
        const o = ac.createOscillator();
        o.type = 'triangle';
        const f = 440*Math.pow(2,(midi-69)/12);
        o.frequency.setValueAtTime(f, t);
        // vibrato
        const lfo = ac.createOscillator();
        const lfoG = ac.createGain();
        lfo.type = 'sine';
        lfo.frequency.setValueAtTime(5.2 + brightness*2.0, t);
        lfoG.gain.setValueAtTime(2 + brightness*4, t);
        lfo.connect(lfoG).connect(o.frequency);
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.42, t+0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        const lp = ac.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(1400 + brightness*2600, t);
        lp.Q.value = 0.6;
        o.connect(g).connect(lp).connect(out);
        o.start(t); o.stop(t+dur+0.02);
        lfo.start(t); lfo.stop(t+dur+0.02);
        audio.nodes.push(o,lfo,lfoG,g,lp);
      }

      function scheduleSparkle(ac, master, reverb, delaySend, start, beat, bars, profile){
        // sparse high bells for “magic”
        const dens = (profile.sparkle && profile.sparkle.density) ? profile.sparkle.density : 0.3;
        const g = ac.createGain();
        g.gain.value = 0.032 + (profile.brightness||0.5)*0.03;
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 780;
        hp.Q.value = 0.5;
        g.connect(hp).connect(master);
        hp.connect(reverb);
        if (delaySend) hp.connect(delaySend);
        audio.nodes.push(g, hp);
        const localRng = mulberry32(profile.seed ^ 0x1234abcd);
        const scale = profile.scale;
        const root = profile.rootMidi;
        for(let bar=0; bar<bars; bar++){
          // pop：副歌点缀更多，主歌更少
          const d = isChorusBar(bar, bars) ? dens : dens*0.45;
          for(let k=0;k<4;k++){
            const t = start + (bar*4 + k) * beat + beat*(0.12 + localRng()*0.28);
            if (localRng() > d) continue;
            const deg = Math.floor(localRng()*scale.length);
            const midi = root + 36 + scale[deg] + (localRng()<0.5 ? 12 : 0);
            bellNote(ac, g, t, beat*(0.45 + localRng()*0.35), midi, profile.brightness||0.5);
          }
        }
      }

      function scheduleChops(ac, master, reverb, delaySend, start, beat, bars, profile){
        // pop chops: short airy chord stabs / strums
        const g = ac.createGain();
        g.gain.value = 0.035 + (profile.brightness||0.5)*0.035;
        g.connect(master);
        g.connect(reverb);
        if (delaySend) g.connect(delaySend);
        audio.nodes.push(g);

        const localRng = mulberry32(profile.seed ^ 0x3344aa11);
        const chordProg = (profile.pad && profile.pad.chordProg) ? profile.pad.chordProg : [0,4,5,3];
        const scale = profile.scale;
        const rootMidi = profile.rootMidi;
        const voicing = (profile.pad && profile.pad.voicing) ? profile.pad.voicing : 'triad';

        // 8th offbeat stabs for verse, 16th for chorus
        for(let bar=0; bar<bars; bar++){
          const isCh = isChorusBar(bar, bars);
          const rate = isCh ? 0.25 : 0.5; // in beats
          const steps = Math.round(4 / rate);
          const deg = chordProg[bar % chordProg.length] || 0;
          const chordRoot = rootMidi + 12 + scale[deg % scale.length];
          const chord = (() => {
            if (voicing === 'sus2') return [chordRoot, chordRoot+2, chordRoot+7];
            if (voicing === 'add9') return [chordRoot, chordRoot+7, chordRoot+14];
            return [chordRoot, chordRoot+7, chordRoot+12];
          })();
          for(let s=0; s<steps; s++){
            const t0 = start + (bar*4 + s*rate) * beat;
            // mainly offbeats
            const off = (rate === 0.5) ? (s % 2 === 1) : (s % 4 === 2);
            const p = off ? (isCh ? 0.85 : 0.65) : (isCh ? 0.22 : 0.12);
            if (localRng() > p) continue;
            popChordStab(ac, g, t0 + (localRng()*2-1)*beat*0.01, beat*rate*0.35, chord, profile.brightness||0.5, isCh);
          }
        }
      }

      function popChordStab(ac, out, t, dur, midis, brightness, chorus){
        const hasPan = !!ac.createStereoPanner;
        const basePan = chorus ? 0.22 : -0.18;
        for(let i=0;i<midis.length;i++){
          const m = midis[i];
          const o1 = ac.createOscillator();
          const o2 = ac.createOscillator();
          o1.type = 'triangle';
          o2.type = 'sine';
          const f = 440*Math.pow(2,(m-69)/12);
          o1.frequency.setValueAtTime(f, t);
          o2.frequency.setValueAtTime(f, t);
          o1.detune.value = -2 - brightness*2;
          o2.detune.value =  2 + brightness*2;
          const g = ac.createGain();
          g.gain.setValueAtTime(0.0001, t);
          g.gain.exponentialRampToValueAtTime(0.24, t+0.01);
          g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
          const hp = ac.createBiquadFilter();
          hp.type='highpass';
          hp.frequency.setValueAtTime(420, t);
          hp.Q.value = 0.5;
          const lp = ac.createBiquadFilter();
          lp.type='lowpass';
          lp.frequency.setValueAtTime(1700 + brightness*2600, t);
          lp.frequency.exponentialRampToValueAtTime(1100 + brightness*1200, t+dur);
          lp.Q.value = 0.7;
          if (hasPan){
            const pan = ac.createStereoPanner();
            const spread = (i/(Math.max(1,midis.length-1))*2 - 1) * 0.22;
            pan.pan.setValueAtTime(clamp(basePan + spread, -0.6, 0.6), t);
            o1.connect(g); o2.connect(g);
            g.connect(hp).connect(lp).connect(pan).connect(out);
            audio.nodes.push(pan);
          } else {
            o1.connect(g); o2.connect(g);
            g.connect(hp).connect(lp).connect(out);
          }
          o1.start(t); o2.start(t);
          o1.stop(t+dur+0.02); o2.stop(t+dur+0.02);
          audio.nodes.push(o1,o2,g,hp,lp);
        }
      }

      function makeImpulse(ac, seconds, decay){
        const rate = ac.sampleRate;
        const len = Math.floor(rate * seconds);
        const buf = ac.createBuffer(2, len, rate);
        for(let ch=0; ch<2; ch++){
          const data = buf.getChannelData(ch);
          for(let i=0;i<len;i++){
            const t = i / len;
            data[i] = (Math.random()*2-1) * 0.18 * Math.pow(1 - t, decay);
          }
        }
        return buf;
      }

      function scheduleDrums(ac, master, reverb, start, beat, bars, profile){
        const brightness = profile.brightness || 0.5;
        const style = (profile.drums && profile.drums.style) || 'steady';
        const kickGain = ac.createGain(); kickGain.gain.value = 0.22;
        const snGain = ac.createGain(); snGain.gain.value = 0.12;
        const hhGain = ac.createGain(); hhGain.gain.value = 0.07 + brightness*0.05;
        kickGain.connect(master); snGain.connect(master); hhGain.connect(master);
        kickGain.connect(reverb); snGain.connect(reverb); hhGain.connect(reverb);

        for(let bar=0; bar<bars; bar++){
          for(let i=0;i<4;i++){
            const t = start + (bar*4 + i) * beat;
            if (style === 'soft'){
              if (i===0) kick(ac, kickGain, t, 0.12, 180);
              if (i===2 && bar%2===1) kick(ac, kickGain, t, 0.10, 176);
              if (i===3 && bar%2===0) snare(ac, snGain, t, 0.12);
              if (i%2===0) hihat(ac, hhGain, t, 0.05, 7200);
            } else if (style === 'brush'){
              if (i===0 || i===2) kick(ac, kickGain, t, 0.12, 186);
              if (i===1 || i===3) snare(ac, snGain, t, 0.16);
              hihat(ac, hhGain, t, 0.05, 7600);
              if (i===2) hihat(ac, hhGain, t + beat*0.25, 0.04, 8800);
            } else if (style === 'drive'){
              if (i===0 || i===2) kick(ac, kickGain, t, 0.12, 196);
              if (i===3) kick(ac, kickGain, t + beat*0.25, 0.10, 188);
              if (i===1 || i===3) snare(ac, snGain, t, 0.18);
              // 16th hats
              for(let k=0;k<4;k++){
                hihat(ac, hhGain, t + beat*(k*0.25), 0.035, 8600 + k*250);
              }
            } else if (style === 'four'){
              // four-on-the-floor
              kick(ac, kickGain, t, 0.11, 196);
              if (i===1 || i===3) snare(ac, snGain, t, 0.16);
              hihat(ac, hhGain, t, 0.05, 9200);
              hihat(ac, hhGain, t + beat*0.5, 0.04, 10400);
            } else {
              // steady (default)
              if (i===0 || i===2) kick(ac, kickGain, t, 0.12, 188);
              if (i===1 || i===3) snare(ac, snGain, t, 0.18);
              hihat(ac, hhGain, t, 0.06, 8000);
              hihat(ac, hhGain, t + beat*0.5, 0.045, 9200);
            }
          }
        }
      }

      function kick(ac, out, t, dur, baseFreq){
        const o = ac.createOscillator();
        const g = ac.createGain();
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.setValueAtTime(150, t);
        hp.Q.value = 0.55;
        o.type = 'triangle';
        o.frequency.setValueAtTime(baseFreq, t);
        o.frequency.exponentialRampToValueAtTime(Math.max(155, baseFreq*0.78), t + dur*0.8);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.42, t + 0.008);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g).connect(hp).connect(out);
        o.start(t); o.stop(t+dur+0.02);
        audio.nodes.push(o, g, hp);
      }

      function snare(ac, out, t, dur){
        const noise = ac.createBufferSource();
        noise.buffer = whiteNoise(ac, dur);
        const bp = ac.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.setValueAtTime(2600, t);
        bp.Q.value = 1.1;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.22, t+0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        noise.connect(bp).connect(g).connect(out);
        noise.start(t); noise.stop(t+dur+0.02);
        audio.nodes.push(noise, bp, g);
      }

      function hihat(ac, out, t, dur, freq){
        const noise = ac.createBufferSource();
        noise.buffer = whiteNoise(ac, dur);
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.setValueAtTime(freq, t);
        hp.Q.value = 0.6;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.12, t+0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        noise.connect(hp).connect(g).connect(out);
        noise.start(t); noise.stop(t+dur+0.02);
        audio.nodes.push(noise, hp, g);
      }

      function whiteNoise(ac, dur){
        const len = Math.floor(ac.sampleRate * dur);
        const buf = ac.createBuffer(1, len, ac.sampleRate);
        const data = buf.getChannelData(0);
        for(let i=0;i<len;i++) data[i] = (Math.random()*2-1) * 0.42;
        return buf;
      }

      function scheduleBass(ac, master, reverb, start, beat, bars, profile){
        const rootMidi = profile.rootMidi;
        const scale = profile.scale;
        const stepBeats = (profile.bass && profile.bass.step) ? profile.bass.step : 0.5;
        const pattern = (profile.bass && profile.bass.pattern) ? profile.bass.pattern : [0,0,5,0, 0,7,5,0];
        const g = ac.createGain();
        g.gain.value = 0.045 + (profile.brightness||0.5)*0.025;
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 260;
        hp.Q.value = 0.55;
        const lp = ac.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 950 + (profile.brightness||0.5)*900;
        g.connect(hp).connect(lp).connect(master);
        lp.connect(reverb);
        audio.nodes.push(g, hp, lp);

        const stepsPerBar = Math.round(4 / stepBeats);
        for(let bar=0; bar<bars; bar++){
          for(let step=0; step<stepsPerBar; step++){
            const t = start + (bar*4 + step*stepBeats) * beat;
            const deg = pattern[(bar*stepsPerBar + step) % pattern.length];
            const midi = rootMidi + scale[(deg|0) % scale.length];
            const dur = beat * stepBeats * (profile.tag==='calm' ? 0.38 : 0.30);
            bassNote(ac, g, t, dur, midi);
          }
        }
      }

      function bassNote(ac, out, t, dur, midi){
        const o = ac.createOscillator();
        o.type = 'triangle';
        const f = 440 * Math.pow(2, (midi-69)/12);
        o.frequency.setValueAtTime(f, t);
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.34, t+0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.setValueAtTime(280, t);
        hp.Q.value = 0.5;
        o.connect(g).connect(hp).connect(out);
        o.start(t); o.stop(t+dur+0.03);
        audio.nodes.push(o,g,hp);
      }

      function schedulePad(ac, master, reverb, start, beat, bars, profile){
        const rootMidi = profile.rootMidi;
        const scale = profile.scale;
        const brightness = profile.brightness || 0.5;
        const localRng = mulberry32(profile.seed ^ 0x22a3b17f);
        const padGain = ac.createGain();
        padGain.gain.value = 0.055 + brightness*0.04 + (profile.tag==='calm' ? 0.015 : 0);
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 380;
        hp.Q.value = 0.55;
        padGain.connect(hp).connect(master);
        hp.connect(reverb);
        audio.nodes.push(padGain, hp);
        const chordProg = (profile.pad && profile.pad.chordProg) ? profile.pad.chordProg : [0,5,3,4, 0,5,4,3];
        const voicing = (profile.pad && profile.pad.voicing) ? profile.pad.voicing : 'triad';
        for(let bar=0; bar<bars; bar++){
          const t = start + bar*4*beat;
          const deg = chordProg[bar % chordProg.length];
          const root = rootMidi + 12 + scale[deg % scale.length];
          const midis = (() => {
            if (voicing === 'sus2') return [root, root+2, root+7, root+12];
            if (voicing === 'add9') return [root, root+7, root+14, root+12];
            return [root, root+7, root+12];
          })();
          padChord(ac, padGain, t, beat*4.0, midis, brightness, localRng);
        }
      }

      function padChord(ac, out, t, dur, midis, brightness, rng){
        let i = 0;
        for(const m of midis){
          const o = ac.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(440*Math.pow(2,(m-69)/12), t);
          // subtle detune for warmth (deterministic per play)
          if (rng) o.detune.value = (rng()*2 - 1) * (0.8 + brightness*1.2);
          const g = ac.createGain();
          const a = 0.0001;
          g.gain.setValueAtTime(a, t);
          g.gain.exponentialRampToValueAtTime(0.22, t+0.45);
          g.gain.setValueAtTime(0.22, t+dur-0.7);
          g.gain.exponentialRampToValueAtTime(a, t+dur);

          const hp = ac.createBiquadFilter();
          hp.type='highpass';
          hp.frequency.setValueAtTime(440, t);
          hp.Q.value = 0.5;
          const lp = ac.createBiquadFilter();
          lp.type='lowpass';
          lp.frequency.setValueAtTime(1200 + brightness*1500, t);
          lp.Q.value = 0.5;
          // stereo widen: spread voices
          const hasPan = !!ac.createStereoPanner;
          if (hasPan){
            const pan = ac.createStereoPanner();
            const base = (midis.length<=1) ? 0 : (i/(midis.length-1))*2 - 1; // -1..1
            const jitter = rng ? (rng()*2-1)*0.12 : 0;
            pan.pan.setValueAtTime(clamp(base*0.38 + jitter, -0.55, 0.55), t);
            o.connect(g).connect(hp).connect(lp).connect(pan).connect(out);
            audio.nodes.push(pan);
          } else {
            o.connect(g).connect(hp).connect(lp).connect(out);
          }
          o.start(t); o.stop(t+dur+0.02);
          audio.nodes.push(o,g,hp,lp);
          i++;
        }
      }

      function scheduleMelody(ac, master, reverb, delaySend, start, beat, bars, profile){
        const rootMidi = profile.rootMidi;
        const scale = profile.scale;
        const brightness = profile.brightness || 0.5;
        const leadGain = ac.createGain();
        leadGain.gain.value = 0.075 + brightness*0.045;
        const leadHp = ac.createBiquadFilter();
        leadHp.type = 'highpass';
        leadHp.frequency.value = 520;
        leadHp.Q.value = 0.55;
        leadGain.connect(leadHp).connect(master);
        leadHp.connect(reverb);
        if (delaySend) leadHp.connect(delaySend);
        audio.nodes.push(leadGain, leadHp);
        const localRng = mulberry32(profile.seed ^ 0x31415926);
        const density = (profile.melody && typeof profile.melody.density === 'number') ? profile.melody.density : 0.42;
        const stepBeats = (profile.melody && profile.melody.step) ? profile.melody.step : 0.5;
        const stepsPerBar = Math.round(4 / stepBeats);

        // motif：让旋律更像“有主题”，并且每次播放都会变
        const motifLen = (profile.tag === 'calm' ? 4 : (localRng()<0.5 ? 8 : 4));
        const motif = [];
        for(let i=0;i<motifLen;i++){
          // cheerful bias: more chord tones (0/2/4/5/7)
          const pick = localRng();
          const cand = (scale.length >= 5)
            ? [0,2,4,5,7].map(x => x % scale.length)
            : [0,2,4].map(x => x % scale.length);
          motif.push(pick < 0.72 ? cand[Math.floor(localRng()*cand.length)] : Math.floor(localRng()*scale.length));
        }
        const motifShift = Math.floor(localRng()*scale.length);
        const swing = 0.06; // 轻微 swing，让旋律更“跳”
        const humanize = (tt, stepIdx) => {
          const sw = (stepBeats <= 0.5 && (stepIdx % 2 === 1)) ? (beat * swing) : 0;
          return tt + sw + (localRng()*2 - 1) * beat * 0.02; // slight timing drift
        };

        for(let bar=0; bar<bars; bar++){
          for(let step=0; step<stepsPerBar; step++){
            const phraseBoost = (step % motifLen === 0) ? 0.12 : 0;
            if (localRng() > (density + phraseBoost)) continue;
            const t0 = start + (bar*4 + step*stepBeats) * beat;
            const t = humanize(t0, step);
            // motif-driven degree with occasional variation
            let deg = motif[step % motifLen];
            if (localRng() < 0.22) deg = (deg + motifShift + (localRng()<0.5 ? 1 : -1) + 16) % scale.length;
            const oct = (profile.tag==='calm' ? 0 : (localRng()<0.22 ? 12 : 0));
            const midi = rootMidi + 12 + scale[deg] + oct;
            const longNote = localRng() < (profile.tag==='calm' ? 0.55 : 0.14);
            const dur = beat*stepBeats*(longNote ? 1.35 : 0.78);
            const style = (profile.melody && profile.melody.style) ? profile.melody.style : 'shimmer';
            if (style === 'pluck') pluckNote(ac, leadGain, t, dur, midi, brightness);
            else if (style === 'bell') bellNote(ac, leadGain, t, dur, midi, brightness);
            else leadNote(ac, leadGain, t, dur, midi, brightness);

            // grace note (小装饰音)：让旋律更欢快灵动
            if (profile.tag !== 'calm' && localRng() < 0.22){
              const gDeg = (deg + (localRng()<0.5 ? 1 : -1) + scale.length) % scale.length;
              const gm = rootMidi + 12 + scale[gDeg] + oct;
              pluckNote(ac, leadGain, t - beat*0.06, beat*0.10, gm, brightness);
            }
          }
        }
      }

      function pluckNote(ac, out, t, dur, midi, brightness){
        // short pluck (triangle + lowpass sweep)
        const o = ac.createOscillator();
        o.type = 'triangle';
        const f = 440*Math.pow(2,(midi-69)/12);
        o.frequency.setValueAtTime(f, t);
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.58, t+0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t+Math.min(dur, 0.32));
        const lp = ac.createBiquadFilter();
        lp.type='lowpass';
        lp.frequency.setValueAtTime(1800 + brightness*2300, t);
        lp.frequency.exponentialRampToValueAtTime(980 + brightness*900, t+Math.min(dur, 0.35));
        lp.Q.value = 0.7;
        o.connect(g).connect(lp).connect(out);
        o.start(t); o.stop(t+Math.min(dur,0.35)+0.02);
        audio.nodes.push(o,g,lp);
      }

      function bellNote(ac, out, t, dur, midi, brightness){
        // bell-ish (two sines with slight detune)
        const f = 440*Math.pow(2,(midi-69)/12);
        const o1 = ac.createOscillator();
        const o2 = ac.createOscillator();
        o1.type='sine'; o2.type='sine';
        o1.frequency.setValueAtTime(f, t);
        o2.frequency.setValueAtTime(f*(2.01 + brightness*0.06), t);
        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.5, t+0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t+Math.min(dur, 0.9));
        o1.connect(g); o2.connect(g);
        g.connect(out);
        o1.start(t); o2.start(t);
        o1.stop(t+Math.min(dur,0.95)+0.02);
        o2.stop(t+Math.min(dur,0.95)+0.02);
        audio.nodes.push(o1,o2,g);
      }

      function scheduleArp(ac, master, reverb, delaySend, start, beat, bars, profile){
        const rootMidi = profile.rootMidi;
        const scale = profile.scale;
        const brightness = profile.brightness || 0.5;
        const rate = profile.arp && profile.arp.rate ? profile.arp.rate : 0.25;
        const stepsPerBar = Math.round(4 / rate);
        const g = ac.createGain();
        g.gain.value = 0.04 + brightness*0.035;
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 520;
        hp.Q.value = 0.5;
        g.connect(hp).connect(master);
        hp.connect(reverb);
        if (delaySend) hp.connect(delaySend);
        audio.nodes.push(g, hp);
        const localRng = mulberry32(profile.seed ^ 0x9e3779b9);
        for(let bar=0; bar<bars; bar++){
          for(let step=0; step<stepsPerBar; step++){
            const t = start + (bar*4 + step*rate) * beat;
            if (localRng() < 0.18 && profile.tag!=='spark') continue;
            const deg = (step + (bar%2)*2) % scale.length;
            const midi = rootMidi + 12 + scale[deg] + (localRng()<0.12 ? 12 : 0);
            pluckNote(ac, g, t, beat*rate*0.95, midi, brightness);
          }
        }
      }

      function leadNote(ac, out, t, dur, midi, brightness){
        // simple glassy shimmer, kept high and gentle
        const car = ac.createOscillator();
        const mod = ac.createOscillator();
        const modGain = ac.createGain();
        car.type = 'sine';
        mod.type = 'sine';
        const f = 440*Math.pow(2,(midi-69)/12);
        car.frequency.setValueAtTime(f, t);
        mod.frequency.setValueAtTime(f*(2.2 + brightness*1.1), t);
        modGain.gain.setValueAtTime(0, t);
        modGain.gain.linearRampToValueAtTime(8 + brightness*28, t+0.02);
        modGain.gain.linearRampToValueAtTime(0, t+dur);
        mod.connect(modGain).connect(car.frequency);

        const g = ac.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.5, t+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);

        const hp = ac.createBiquadFilter();
        hp.type='highpass';
        hp.frequency.setValueAtTime(620, t);
        hp.Q.value=0.4;

        car.connect(g).connect(hp).connect(out);
        car.start(t); car.stop(t+dur+0.02);
        mod.start(t); mod.stop(t+dur+0.02);
        audio.nodes.push(car,mod,modGain,g,hp);
      }

      // ---------- Star picking ----------
      let lastStarDraw = []; // {p, sx, sy, r}
      function pickStar(x,y){
        // nearest drawn star
        let best=null, bestD=1e9;
        for(const s of lastStarDraw){
          const dx = x - s.sx, dy = y - s.sy;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < s.r*2.0 && d < bestD){
            best = s.p;
            bestD = d;
          }
        }
        return best;
      }

      // ---------- Render Loop ----------
      let tPrev = now();
      function frame(){
        const t = now();
        const dt = Math.min(50, t - tPrev);
        tPrev = t;
        dtSec = Math.max(0.001, dt / 1000);

        // physics
        if (!dragging && !focusAnim){
          if (Math.abs(yawVel) + Math.abs(pitchVel) > 1e-6){
            globeQ = quatNormalize(quatMul(
              quatMul(quatFromAxisAngle({x:0,y:1,z:0}, yawVel), quatFromAxisAngle({x:1,y:0,z:0}, pitchVel)),
              globeQ
            ));
            yawVel *= 0.93;
            pitchVel *= 0.93;
          }
        } else if (focusAnim){
          // 聚焦动画期间强制消除惯性
          yawVel = 0;
          pitchVel = 0;
        }

        // focus animation
        if (focusAnim){
          const u = clamp((t - focusAnim.t0) / focusAnim.dur, 0, 1);
          const e = easeOutCubic(u);
          globeQ = quatSlerp(focusAnim.from.q, focusAnim.to.q, e);
          globeScale = lerp(focusAnim.from.s, focusAnim.to.s, e);
          if (u >= 1){
            const done = focusAnim.onDone;
            focusAnim = null;
            done && done();
          }
        } else {
          globeScale = lerp(globeScale, targetScale, 0.06);
          // 不把旋转角度拉回“目标角度”，让地球保持完全自由旋转
        }

        // auto advance question if idle
        if (scene === Scene.QUESTIONS){
          if (!qTransitioning && t > idleAt){
            completeQuestion();
          }
        }

        draw(t);
        // animate poster overlay on its own canvas
        if (scene === Scene.POSTER){
          updatePosterAnim();
        }
        requestAnimationFrame(frame);
      }

      function draw(t){
        const g = ctx;
        // background
        const bg = g.createLinearGradient(0,0,0,H);
        // 问答页：每题一个不同的氛围场，避免单调
        if (scene === Scene.QUESTIONS){
          const th = qTheme || QUESTION_THEMES[0];
          bg.addColorStop(0, th.bg0);
          bg.addColorStop(0.45, th.bg1);
          bg.addColorStop(1, th.bg2);
        } else {
          bg.addColorStop(0, '#2b1231');
          bg.addColorStop(0.4, '#130b17');
          bg.addColorStop(1, '#07050a');
        }
        g.fillStyle = bg;
        g.fillRect(0,0,W,H);

        // subtle floating dust
        const dustCount = 60;
        g.globalAlpha = 0.38;
        for(let i=0;i<dustCount;i++){
          const p = pseudoDust(i, t*0.00006);
          const r = p.r*DPR;
          const gg = g.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
          gg.addColorStop(0, `rgba(255, 205, 150, ${0.24})`);
          gg.addColorStop(1, 'rgba(0,0,0,0)');
          g.fillStyle = gg;
          g.beginPath();
          g.arc(p.x, p.y, r, 0, TAU);
          g.fill();
        }
        g.globalAlpha = 1;

        if (scene === Scene.INTRO){
          // show a calm breathing orb
          drawBreathingOrb(g, t);
          return;
        }

        if (scene === Scene.GLOBE || scene === Scene.MATCH){
          drawGlobe(g, t);
          // auto show match person card when stopped
          if (scene === Scene.MATCH && match && !dragging){
            const mp = match.person;
            // if the match star is visible in lastStarDraw, pin card
            const star = lastStarDraw.find(s => s.p && s.p.id === mp.id);
            if (star){
              showPersonCard(mp, star.sx, star.sy, false);
            }
          }
          return;
        }

        if (scene === Scene.QUESTIONS){
          drawQuestionBubbles(g, t);
          return;
        }

        // scenes 4/6 use card canvas already; keep a faint earth in background
        drawBreathingOrb(g, t);
      }

      function pseudoDust(i, tt){
        const s = (appSeed + i*9973) >>> 0;
        const r0 = mulberry32(s);
        const x0 = r0()*W;
        const y0 = r0()*H;
        const sp = 0.2 + r0()*0.8;
        const ang = r0()*TAU;
        const x = (x0 + Math.cos(ang)*tt*W*sp) % W;
        const y = (y0 + Math.sin(ang)*tt*H*sp) % H;
        return {x: (x+W)%W, y:(y+H)%H, r: 12 + r0()*22};
      }

      function drawBreathingOrb(g, t){
        const cx = W*0.5, cy = H*0.46;
        const base = Math.min(W,H) * 0.22;
        const breathe = 1 + Math.sin(t*0.0013)*0.03;
        const r = base * breathe;
        const grad = g.createRadialGradient(cx - r*0.25, cy - r*0.25, r*0.18, cx, cy, r*1.1);
        grad.addColorStop(0, 'rgba(255,240,220,.92)');
        grad.addColorStop(.35, 'rgba(255,195,145,.78)');
        grad.addColorStop(1, 'rgba(120,45,68,.92)');
        g.beginPath();
        g.arc(cx, cy, r, 0, TAU);
        g.fillStyle = grad;
        g.fill();
        // halo
        const halo = g.createRadialGradient(cx, cy, r*0.2, cx, cy, r*1.8);
        halo.addColorStop(0, 'rgba(255,180,120,.22)');
        halo.addColorStop(1, 'rgba(0,0,0,0)');
        g.fillStyle = halo;
        g.beginPath();
        g.arc(cx, cy, r*1.6, 0, TAU);
        g.fill();
      }

      function drawGlobe(g, t){
        const cx = W*0.5;
        const cy = H*0.48;
        const r = Math.min(W,H) * 0.32 * globeScale;

        // globe shadow
        g.save();
        g.globalAlpha = 0.32;
        g.fillStyle = '#000';
        g.beginPath();
        g.ellipse(cx + r*0.08, cy + r*0.22, r*0.84, r*0.66, 0, 0, TAU);
        g.fill();
        g.restore();

        // ✅ 始终渲染“圆点点阵大陆”（优先 isLandMask），保证你在 Edge/360/QQ 等浏览器、以及 file:// 打开时都一致
        const light = normalize({x:-0.6, y:-0.25, z: 1});
        const latSteps = 34;
        const lonSteps = 56;
        const dotSize = Math.max(3.5, Math.min(10.5, r*0.022));
        const oceanDot = { r: 26, g: 52, b: 120 };     // 深蓝像素
        const landA = { r: 70, g: 170, b: 92 };       // 绿
        const landB = { r: 255, g: 214, b: 160 };     // 暖黄
        const ice   = { r: 245, g: 245, b: 248 };     // 冰雪偏白

        g.save();
        g.beginPath();
        g.arc(cx, cy, r, 0, TAU);
        g.clip();

        const oceanGrad = g.createRadialGradient(cx - r*0.3, cy - r*0.35, r*0.1, cx, cy, r*1.2);
        oceanGrad.addColorStop(0, 'rgba(40, 18, 55, .90)');
        oceanGrad.addColorStop(1, 'rgba(12, 6, 20, .98)');
        g.fillStyle = oceanGrad;
        g.fillRect(cx-r, cy-r, r*2, r*2);

        for(let il=0; il<latSteps; il++){
          const lat = lerp(-88, 88, il/(latSteps-1));
          const latR = lat*Math.PI/180;
          for(let io=0; io<lonSteps; io++){
            const lon = lerp(-180, 180, io/(lonSteps-1));
            const lonR = lon*Math.PI/180;
            const baseV = latLonToVec(latR, lonR);
            const v = quatRotateVec(globeQ, baseV);
            if (v.z < 0) continue;
            const p = project(v, cx, cy, r);
            const ndl = clamp(dot(normalize(v), light)*0.5 + 0.55, 0, 1);

            const land = isLandStable(lat, lon);

            // 像素点“稀疏度”控制：海洋更稀疏，大陆更密集
            const oceanKeep = ((il + io) % 3 === 0);
            const landKeep = ((il + io) % 2 === 0);
            if (!land && !oceanKeep) continue;
            if (land && !landKeep) continue;

            const shade = 0.55 + 0.55*ndl;
            if (land){
              const isIce = Math.abs(lat) > 72;
              const tMix = clamp((0.55 - Math.abs(lat)/90) * 0.65 + ndl*0.35, 0, 1);
              const c = isIce ? ice : lerpColor(landA, landB, tMix);
              const rr = Math.round(c.r * shade);
              const gg = Math.round(c.g * shade);
              const bb = Math.round(c.b * shade);
              g.fillStyle = `rgba(${rr},${gg},${bb},${0.92})`;
              g.fillRect(p.x, p.y, dotSize, dotSize);
            } else {
              const rr = Math.round(oceanDot.r * (0.55 + 0.45*ndl));
              const gg = Math.round(oceanDot.g * (0.55 + 0.45*ndl));
              const bb = Math.round(oceanDot.b * (0.55 + 0.45*ndl));
              g.fillStyle = `rgba(${rr},${gg},${bb},${0.38})`;
              g.fillRect(p.x, p.y, dotSize*0.8, dotSize*0.8);
            }
          }
        }

        // gloss
        const gloss = g.createRadialGradient(cx - r*0.35, cy - r*0.35, 0, cx - r*0.2, cy - r*0.2, r*1.2);
        gloss.addColorStop(0, 'rgba(255,255,255,.22)');
        gloss.addColorStop(0.6, 'rgba(255,255,255,.05)');
        gloss.addColorStop(1, 'rgba(255,255,255,0)');
        g.fillStyle = gloss;
        g.beginPath();
        g.arc(cx, cy, r, 0, TAU);
        g.fill();

        g.restore();

        // outline
        g.save();
        g.strokeStyle = 'rgba(255,255,255,.10)';
        g.lineWidth = Math.max(2, r*0.01);
        g.beginPath();
        g.arc(cx, cy, r, 0, TAU);
        g.stroke();
        g.restore();

        // stars
        lastStarDraw = [];
        const tt = t*0.001;
        for(const p of people){
          const v0 = latLonToVec(p.lat*Math.PI/180, p.lon*Math.PI/180);
          const v = quatRotateVec(globeQ, v0);
          if (v.z < 0.02) continue;
          const sp = project(v, cx, cy, r);
          const tw = 0.55 + 0.45*Math.sin(tt*2.2 + p.tw);
          const size = (2.4 + 2.2*tw) * DPR;
          const glow = g.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, 9*DPR);
          glow.addColorStop(0, `rgba(255, 245, 235, ${0.55*tw})`);
          glow.addColorStop(0.35, `rgba(255, 190, 140, ${0.28*tw})`);
          glow.addColorStop(1, 'rgba(0,0,0,0)');
          g.fillStyle = glow;
          g.beginPath();
          g.arc(sp.x, sp.y, 9*DPR, 0, TAU);
          g.fill();
          g.fillStyle = `rgba(255,255,255,${0.8*tw})`;
          g.beginPath();
          g.arc(sp.x, sp.y, size, 0, TAU);
          g.fill();
          lastStarDraw.push({ p, sx: sp.x, sy: sp.y, r: size });
        }
      }

      function drawQuestionBubbles(g, t){
        // background orb
        drawBreathingOrb(g, t);
        // particles
        updateParticles();
        updateRipples();
        drawParticles(g);
        drawRipples(g);

        // tiny feedback toast between questions
        if (feedbackToast){
          const u = clamp((t - feedbackToast.t0) / feedbackToast.dur, 0, 1);
          const easeOut = (x) => 1 - Math.pow(1 - x, 3);
          const easeIn = (x) => x*x*x;
          const inDur = 0.22;
          const outDur = 0.28;
          const aIn = clamp(u / inDur, 0, 1);
          const aOut = clamp((u - (1 - outDur)) / outDur, 0, 1);
          const alpha = clamp(easeOut(aIn) * (1 - easeIn(aOut)), 0, 1);
          const enter = easeOut(aIn);
          const exit = easeIn(aOut);
          const slide = (1 - enter) * (10*DPR) + exit * (8*DPR); // 渐入上浮，渐出轻微下沉
          const scale = 0.985 + 0.015*enter; // 轻微缩放增强“呼吸感”
          g.save();
          g.globalAlpha = 0.94 * alpha;
          const text = feedbackToast.text;
          g.font = `800 ${Math.round(22*DPR)}px "Microsoft YaHei", system-ui`;
          const padX = 18*DPR, padY = 12*DPR;
          const tw = g.measureText(text).width;
          const bw = tw + padX*2;
          const bh = 60*DPR;
          const bx = W*0.5 - bw*0.5;
          const by = (H*0.18 - bh*0.5) + slide;
          // scale around center
          g.translate(W*0.5, by + bh*0.5);
          g.scale(scale, scale);
          g.translate(-W*0.5, -(by + bh*0.5));
          g.fillStyle = 'rgba(12,6,20,.55)';
          g.strokeStyle = 'rgba(255,255,255,.14)';
          g.lineWidth = 2;
          roundRect(g, bx, by, bw, bh, 18*DPR);
          g.fill();
          g.stroke();
          g.fillStyle = 'rgba(255,233,210,.92)';
          g.textAlign = 'center';
          g.textBaseline = 'middle';
          g.fillText(text, W*0.5, by + bh*0.52);
          g.restore();
        }
        // bubbles
        const tt = t*0.001;
        for(const b of bubbles){
          // gentle float
          const float = Math.sin(tt*1.2 + b.hue)*2.4*DPR;
          const x = b.x;
          const y = b.y + float;
          const r = b.r;
          // pulse ring
          if (b.pulse > 0){
            b.pulse = Math.max(0, b.pulse - dtSec*1.8);
            const pr = r * (1.05 + (1-b.pulse)*0.55);
            g.save();
            g.globalCompositeOperation = 'lighter';
            g.strokeStyle = `hsla(${b.hue+10}, 95%, 78%, ${0.55*b.pulse})`;
            g.lineWidth = (3 + 6*(1-b.pulse)) * DPR;
            g.beginPath();
            g.arc(x, y, pr, 0, TAU);
            g.stroke();
            g.restore();
          }
          const grad = g.createRadialGradient(x - r*0.25, y - r*0.25, r*0.1, x, y, r*1.1);
          grad.addColorStop(0, `hsla(${b.hue}, 95%, 82%, .85)`);
          grad.addColorStop(.55, `hsla(${b.hue+8}, 90%, 62%, .55)`);
          grad.addColorStop(1, 'rgba(25,12,22,.12)');
          g.fillStyle = grad;
          g.beginPath();
          g.arc(x, y, r, 0, TAU);
          g.fill();
          g.strokeStyle = 'rgba(255,255,255,.22)';
          g.lineWidth = 2;
          g.stroke();

          // text
          g.fillStyle = 'rgba(255,255,255,.92)';
          g.font = `700 ${Math.round(16*DPR + Math.min(b.clicks,10)*0.7)}px "Microsoft YaHei", system-ui`;
          g.textAlign = 'center';
          g.textBaseline = 'middle';
          g.fillText(b.key, x, y);
          // intensity dot
          if (b.clicks > 0){
            g.fillStyle = 'rgba(255,233,210,.75)';
            g.font = `600 ${Math.round(12*DPR)}px "Microsoft YaHei", system-ui`;
            g.fillText(`×${b.clicks}`, x, y + r*0.58);
          }
        }

        // progress hint
        if (!qTransitioning){
          const remain = clamp((idleAt - t) / 1000, 0, IDLE_TO_NEXT_MS/1000);
          g.textAlign = 'center';
          g.textBaseline = 'alphabetic';
          g.fillStyle = 'rgba(255,233,210,.65)';
          g.font = `${Math.round(14*DPR)}px "Microsoft YaHei", system-ui`;
          g.fillText(`将于 ${remain.toFixed(1)}s 后自动记录`, W*0.5, H*0.84);
        }
      }

      // ---------- Start ----------
      enterIntro();
      requestAnimationFrame(frame);

    } catch (e) {
      console.error(e);
      errDetail.textContent = (e && e.message) ? e.message : ERROR_TEXT;
      err.classList.add('show');
    }
  })();
  </script>
